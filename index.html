<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stoic Flow — Daily Quotes & Focus Timer</title>

<!-- Open Source Fonts from Google Fonts -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════════
     CSS CUSTOM PROPERTIES — OS ADAPTIVE THEME
     ═══════════════════════════════════════════ */
  :root {
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Outfit', system-ui, sans-serif;

    /* Light theme (default) */
    --bg-primary: #f5f0eb;
    --bg-glass: rgba(255, 255, 255, 0.55);
    --bg-glass-hover: rgba(255, 255, 255, 0.72);
    --border-glass: rgba(180, 170, 155, 0.3);
    --text-primary: #2c2824;
    --text-secondary: #6b6259;
    --text-muted: #9a9088;
    --accent: #8b6f4e;
    --accent-glow: rgba(139, 111, 78, 0.15);
    --shadow-soft: rgba(44, 40, 36, 0.06);
    --shadow-medium: rgba(44, 40, 36, 0.1);
    --overlay: rgba(245, 240, 235, 0.35);
    --pomo-work: #8b6f4e;
    --pomo-break: #5a7f6a;
    --pomo-ring-bg: rgba(139, 111, 78, 0.12);
    --toast-bg: rgba(255,255,255,0.85);
    --settings-bg: rgba(252, 249, 246, 0.96);
    --settings-border: rgba(160, 148, 132, 0.45);
  }

  /* Dark theme — adapts to OS preference */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1816;
      --bg-glass: rgba(40, 36, 32, 0.6);
      --bg-glass-hover: rgba(50, 45, 40, 0.75);
      --border-glass: rgba(100, 90, 78, 0.25);
      --text-primary: #e8e0d8;
      --text-secondary: #a89e94;
      --text-muted: #6b6259;
      --accent: #c9a87c;
      --accent-glow: rgba(201, 168, 124, 0.12);
      --shadow-soft: rgba(0, 0, 0, 0.15);
      --shadow-medium: rgba(0, 0, 0, 0.3);
      --overlay: rgba(26, 24, 22, 0.45);
      --pomo-work: #c9a87c;
      --pomo-break: #7aab8e;
      --pomo-ring-bg: rgba(201, 168, 124, 0.1);
      --toast-bg: rgba(40,36,32,0.9);
      --settings-bg: rgba(30, 27, 24, 0.97);
      --settings-border: rgba(100, 88, 72, 0.55);
    }
  }

  /* High contrast mode */
  @media (prefers-contrast: high) {
    :root {
      --bg-glass: rgba(255, 255, 255, 0.85);
      --border-glass: rgba(0, 0, 0, 0.4);
      --text-primary: #000;
      --text-secondary: #333;
    }
  }
  @media (prefers-contrast: high) and (prefers-color-scheme: dark) {
    :root {
      --bg-glass: rgba(0, 0, 0, 0.85);
      --border-glass: rgba(255, 255, 255, 0.4);
      --text-primary: #fff;
      --text-secondary: #ccc;
    }
  }

  /* ═══════════════════════
     LANGUAGE SELECTOR
     ═══════════════════════ */
  .lang-selector {
    position: fixed;
    top: 1rem;
    right: 1rem;
    z-index: 100;
  }
  .lang-btn {
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    color: var(--text-secondary);
    background: var(--bg-glass);
    border: 1px solid var(--border-glass);
    border-radius: 10px;
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .lang-btn:hover { background: var(--bg-glass-hover); border-color: var(--accent); }
  .lang-btn svg { width: 14px; height: 14px; fill: currentColor; opacity: 0.7; }
  .lang-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--settings-bg);
    border: 1px solid var(--settings-border);
    border-radius: 12px;
    padding: 0.35rem;
    min-width: 150px;
    max-height: 280px;
    overflow-y: auto;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px var(--shadow-medium);
    display: none;
  }
  .lang-dropdown.open { display: block; animation: fadeSlideIn 0.25s ease; }
  .lang-option {
    display: block;
    width: 100%;
    text-align: left;
    font-family: var(--font-body);
    font-size: 0.78rem;
    color: var(--text-primary);
    background: none;
    border: none;
    border-radius: 8px;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .lang-option:hover { background: var(--accent-glow); }
  .lang-option.active { color: var(--accent); font-weight: 500; }
  .lang-translating {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-align: center;
    padding: 0.2rem 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .lang-translating.visible { opacity: 1; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ═══════════════════════
     RESET & BASE
     ═══════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    font-size: 16px;
    scroll-behavior: smooth;
    color-scheme: light dark;
  }

  body {
    font-family: var(--font-body);
    color: var(--text-primary);
    background: var(--bg-primary);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════════════════════
     BACKGROUND IMAGE
     ═══════════════════════ */
  #bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1.8s ease;
    opacity: 0;
  }
  #bg-layer.loaded { opacity: 1; }

  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: var(--overlay);
  }

  /* ═══════════════════════
     PAGE LAYOUT — flex-column, no fixed overlay elements
     ═══════════════════════ */
  .page-layout {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: visible;
  }

  /* ═══════════════════════
     MAIN CONTENT
     ═══════════════════════ */
  .content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 760px;
    padding: 2rem;
    margin: 0 auto;
    overflow: visible;
  }

  /* ═══════════════════════
     BOTTOM BAR — pomo + credit side by side
     ═══════════════════════ */
  .page-bottom {
    flex-shrink: 0;
    width: 100%;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 1.5rem 1.5rem;
    gap: 0.75rem;
  }

  /* ═══════════════════════
     QUOTE CARD
     ═══════════════════════ */
  .quote-card {
    background: var(--bg-glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    padding: 3rem 2.75rem;
    text-align: center;
    box-shadow:
      0 8px 32px var(--shadow-soft),
      0 2px 8px var(--shadow-soft);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.4s ease;
    animation: cardEnter 1s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
  }

  .quote-card:hover {
    transform: translateY(-2px);
    box-shadow:
      0 12px 40px var(--shadow-medium),
      0 4px 12px var(--shadow-soft);
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .quote-mark {
    font-family: var(--font-display);
    font-size: 4rem;
    line-height: 1;
    color: var(--accent);
    opacity: 0.35;
    margin-bottom: -1rem;
    user-select: none;
  }

  .quote-text {
    font-family: var(--font-display);
    font-size: 1.65rem;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text-primary);
    margin-bottom: 1.5rem;
    font-style: italic;
    transition: opacity 0.5s ease;
  }

  .quote-author {
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: opacity 0.5s ease;
  }

  .quote-author::before {
    content: '— ';
    opacity: 0.5;
  }

  .quote-action-row {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 1.75rem;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    border-radius: 100px;
    border: 1px solid var(--border-glass);
    background: var(--bg-glass);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .btn:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .btn:active { transform: scale(0.97); }

  /* ═══════════════════════
     POMODORO TIMER
     Zone Productivity Timer style
     ═══════════════════════ */
  .pomo-container {
    position: relative;
    z-index: 100;
    flex-shrink: 0;
    animation: pomoEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
  }

  @keyframes pomoEnter {
    from { opacity: 0; transform: translateY(20px) scale(0.92); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .pomo-widget {
    background: var(--bg-glass);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid var(--border-glass);
    border-radius: 28px;
    padding: 1.5rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    width: 172px;
    box-shadow: 0 8px 36px var(--shadow-soft), 0 2px 8px var(--shadow-soft);
    transition: box-shadow 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    cursor: default;
  }

  .pomo-widget:hover {
    box-shadow: 0 14px 44px var(--shadow-medium), 0 2px 8px var(--shadow-soft);
  }

  /* Large ring */
  .pomo-ring-wrapper {
    position: relative;
    width: 130px;
    height: 130px;
    flex-shrink: 0;
  }

  .pomo-ring {
    width: 130px;
    height: 130px;
    transform: rotate(-90deg);
  }

  .pomo-ring-bg {
    fill: none;
    stroke: var(--pomo-ring-bg);
    stroke-width: 5.5;
  }

  .pomo-ring-progress {
    fill: none;
    stroke: var(--pomo-work);
    stroke-width: 5.5;
    stroke-linecap: round;
    stroke-dasharray: 326.73;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
  }

  .pomo-ring-progress.on-break {
    stroke: var(--pomo-break);
  }

  /* Center content inside ring */
  .pomo-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.1rem;
  }

  .pomo-label {
    font-family: var(--font-body);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .pomo-time-inside {
    font-family: 'Raleway', var(--font-body), system-ui, sans-serif;
    font-size: 2.7rem;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }

  .pomo-time-unit {
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-left: 1px;
    vertical-align: middle;
  }

  /* Session progress dots */
  .pomo-dots {
    display: flex;
    gap: 4px;
    margin-top: 0.3rem;
  }

  .pomo-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--pomo-ring-bg);
    transition: background 0.3s ease;
  }

  .pomo-dot.done {
    background: var(--pomo-work);
  }

  .pomo-dot.done.on-break {
    background: var(--pomo-break);
  }

  /* Controls row */
  .pomo-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .pomo-btn {
    border-radius: 50%;
    border: 1px solid var(--border-glass);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  /* Large primary play/pause button */
  .pomo-btn--primary {
    width: 44px;
    height: 44px;
    background: var(--pomo-work);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .pomo-btn--primary.on-break {
    background: var(--pomo-break);
    box-shadow: 0 4px 14px rgba(90, 127, 106, 0.25);
  }

  .pomo-btn--primary:hover {
    opacity: 0.88;
    transform: scale(1.06);
  }

  /* Phase-complete ready-to-start state */
  .pomo-btn--primary.phase-ready {
    animation: pulseReady 1.6s ease-in-out infinite;
  }

  @keyframes pulseReady {
    0%, 100% { box-shadow: 0 4px 14px var(--accent-glow), 0 0 0 0 var(--accent-glow); }
    50%       { box-shadow: 0 4px 18px var(--accent-glow), 0 0 0 7px transparent; }
  }

  .pomo-phase-ready-label {
    font-family: var(--font-body);
    font-size: 0.58rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--pomo-work);
    text-align: center;
    margin-top: -0.25rem;
    opacity: 0;
    max-height: 0;
    transition: opacity 0.4s ease, max-height 0.4s ease;
    overflow: hidden;
  }

  .pomo-phase-ready-label.visible {
    opacity: 1;
    max-height: 1.2em;
  }

  .pomo-phase-ready-label.on-break {
    color: var(--pomo-break);
  }

  /* Small secondary reset/settings buttons */
  .pomo-btn--secondary {
    width: 32px;
    height: 32px;
  }

  .pomo-btn--secondary:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
    border-color: var(--accent);
  }

  .pomo-btn svg {
    fill: currentColor;
  }

  .pomo-btn--primary svg {
    width: 18px;
    height: 18px;
  }

  .pomo-btn--secondary svg {
    width: 13px;
    height: 13px;
  }

  /* Settings panel */
  .pomo-settings {
    display: none;
    position: absolute;
    bottom: calc(100% + 0.75rem);
    left: 0;
    background: var(--settings-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--settings-border);
    border-radius: 18px;
    padding: 1.25rem;
    min-width: 210px;
    max-height: calc(100dvh - 220px);
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
    animation: settingsIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 500;
  }

  .pomo-settings.open { display: block; }

  @keyframes settingsIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pomo-settings h4 {
    font-family: var(--font-body);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.85rem;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
  }

  .setting-row label {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--text-secondary);
  }

  .setting-row input[type="number"] {
    width: 52px;
    padding: 0.3rem 0.4rem;
    border-radius: 8px;
    border: 1px solid var(--settings-border);
    background: rgba(0,0,0,0.04);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.8rem;
    text-align: center;
    outline: none;
    transition: border-color 0.25s;
  }
  @media (prefers-color-scheme: dark) {
    .setting-row input[type="number"] { background: rgba(255,255,255,0.06); }
  }

  .setting-row input[type="number"]:focus {
    border-color: var(--accent);
  }

  .setting-divider {
    height: 1px;
    background: var(--settings-border);
    margin: 0.85rem 0 0.75rem;
  }

  .setting-phase-chips {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .phase-chip {
    flex: 1;
    padding: 0.32rem 0.4rem;
    border-radius: 8px;
    border: 1px solid var(--settings-border);
    background: rgba(0,0,0,0.04);
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 0.72rem;
    font-weight: 400;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .phase-chip:hover {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
  }

  @media (prefers-color-scheme: dark) {
    .phase-chip { background: rgba(255,255,255,0.06); }
    .phase-chip:hover { background: var(--accent); color: #1a1816; }
  }

  /* ═══════════════════════
     IMAGE CREDIT
     ═══════════════════════ */
  .img-credit {
    position: relative;
    z-index: 10;
    align-self: flex-end;
    font-family: var(--font-body);
    font-size: 0.68rem;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.82);
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    text-decoration: none;
    background: rgba(0, 0, 0, 0.22);
    padding: 0.28rem 0.7rem;
    border-radius: 100px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    opacity: 0.72;
    transition: opacity 0.3s ease, background 0.3s ease;
    letter-spacing: 0.02em;
    max-width: calc(100% - 180px);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 1;
    min-width: 0;
  }

  .img-credit:hover {
    opacity: 1;
    background: rgba(0, 0, 0, 0.36);
  }
  .img-credit a {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
  }
  .img-credit a:hover { text-decoration: underline; }

  /* ═══════════════════════
     POMODORO FULL-PAGE VIEW
     ═══════════════════════ */
  .pomo-fullpage-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 900;
    background: var(--bg-glass);
    backdrop-filter: blur(32px) saturate(1.4);
    -webkit-backdrop-filter: blur(32px) saturate(1.4);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    opacity: 0;
    transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .pomo-fullpage-overlay.open {
    display: flex;
    opacity: 1;
  }

  .pomo-fullpage-overlay .pomo-ring-wrapper {
    width: 280px;
    height: 280px;
  }

  .pomo-fullpage-overlay .pomo-ring {
    width: 280px;
    height: 280px;
  }

  .pomo-fullpage-overlay .pomo-time-inside {
    font-size: 5.5rem;
  }

  .pomo-fullpage-overlay .pomo-label {
    font-size: 0.85rem;
  }

  .pomo-fullpage-overlay .pomo-dots {
    margin-top: 0.5rem;
  }

  .pomo-fullpage-overlay .pomo-dot {
    width: 8px;
    height: 8px;
  }

  .pomo-fullpage-overlay .pomo-time-unit {
    font-size: 1.4rem;
  }

  .pomo-fullpage-overlay .pomo-controls {
    gap: 1rem;
  }

  .pomo-fullpage-overlay .pomo-btn--primary {
    width: 60px;
    height: 60px;
  }

  .pomo-fullpage-overlay .pomo-btn--primary svg {
    width: 26px;
    height: 26px;
  }

   STATE
   ═══════════════════════════════════════ */
let currentQuoteIdx = 0;
let currentBgIdx = 0;

/* ═══════════════════════════════════════
   QUOTE LOGIC
   ═══════════════════════════════════════ */
function showRandomQuote() {
  const textEl = document.getElementById('quote-text');
  const authorEl = document.getElementById('quote-author');

  // fade out
  textEl.style.opacity = '0';
  authorEl.style.opacity = '0';

  setTimeout(() => {
    let idx;
    do { idx = Math.floor(Math.random() * QUOTES.length); } while (idx === currentQuoteIdx && QUOTES.length > 1);
    currentQuoteIdx = idx;

    textEl.textContent = QUOTES[idx].text;
    authorEl.textContent = QUOTES[idx].author;

    // fade in
    textEl.style.opacity = '1';
    authorEl.style.opacity = '1';
  }, 400);
}

/* ═══════════════════════════════════════
   BACKGROUND LOGIC
   ═══════════════════════════════════════ */
function loadBackground(index) {
  const bg = BACKGROUNDS[index];
  const layer = document.getElementById('bg-layer');
  const credit = document.getElementById('img-credit');

  layer.classList.remove('loaded');

  const img = new Image();
  img.onload = () => {
    layer.style.backgroundImage = `url(${bg.url})`;
    layer.classList.add('loaded');
    const src = bg.source || 'Unsplash';
    if (src === 'Unsplash' || src === 'Pexels') {
      credit.innerHTML = `Photo: <a href="${bg.link}" target="_blank" rel="noopener">${bg.credit}</a> · ${src}`;
    } else {
      credit.innerHTML = `<a href="${bg.link}" target="_blank" rel="noopener">${bg.credit}</a> · ${src}`;
    }
  };
  img.onerror = () => {
    // fallback: try next image
    currentBgIdx = (currentBgIdx + 1) % BACKGROUNDS.length;
    loadBackground(currentBgIdx);
  };
  img.src = bg.url;
}

function nextBackground() {
  let idx;
  do { idx = Math.floor(Math.random() * BACKGROUNDS.length); } while (idx === currentBgIdx && BACKGROUNDS.length > 1);
  currentBgIdx = idx;
  loadBackground(currentBgIdx);
}

/* ═══════════════════════════════════════
   TOAST
   ═══════════════════════════════════════ */
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 3000);
}

/* ═══════════════════════════════════════
   POMODORO TIMER — PERSISTENT
   Uses timestamps so it keeps running
   even when the tab is hidden or closed.
   State is persisted to localStorage.
   ═══════════════════════════════════════ */
const POMO_KEY = 'stoicflow_pomo';
const CIRCUMFERENCE = 2 * Math.PI * 52; // ~326.73  (r=52 in 120×120 viewBox)

/* ── Shared AudioContext (created on first user gesture) ── */
let _audioCtx = null;
function initAudioCtx() {
  if (_audioCtx) return _audioCtx;
  try {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {}
  return _audioCtx;
}

/* Play completion chime — async so ctx.resume() is properly awaited on mobile */
async function playCompletionChime(wasBreak) {
  try {
    const ctx = initAudioCtx();
    if (!ctx) return;
    if (ctx.state === 'suspended') await ctx.resume();
    if (ctx.state !== 'running') return;

    function bowlTone(freq, startTime, vol, decay) {
      const t0 = ctx.currentTime + startTime;
      const master = ctx.createGain();
      master.connect(ctx.destination);
      master.gain.setValueAtTime(0, t0);
      master.gain.linearRampToValueAtTime(vol, t0 + 0.008);
      master.gain.exponentialRampToValueAtTime(0.0001, t0 + decay);
      [[1, 1], [2.756, 0.28], [5.404, 0.12]].forEach(([ratio, relVol]) => {
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq * ratio;
        g.gain.value = relVol;
        osc.connect(g); g.connect(master);
        osc.start(t0);
        osc.stop(t0 + decay);
      });
    }

    if (wasBreak) {
      bowlTone(783.99, 0,    0.18, 3.0);
      bowlTone(659.25, 0.45, 0.12, 2.6);
    } else {
      bowlTone(523.25, 0,    0.20, 3.8);
      bowlTone(659.25, 0.50, 0.16, 3.4);
      bowlTone(783.99, 1.00, 0.13, 3.0);
    }
  } catch(e) {}
}

let pomo = loadPomoState();

function defaultPomoState() {
  return {
    workMin: 25,
    breakMin: 5,
    longBreakMin: 15,
    sessionsBeforeLong: 4,
    completedSessions: 0,
    isRunning: false,
    isBreak: false,
    startedAt: null,       // timestamp when current segment started
    pausedRemaining: null, // seconds remaining when paused
    totalSeconds: 25 * 60,
  };
}

function loadPomoState() {
  try {
    const raw = localStorage.getItem(POMO_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (typeof s.workMin !== 'number') return defaultPomoState();
      // If stored as running with a startedAt, verify it's a valid timestamp
      if (s.isRunning && s.startedAt) {
        const elapsed = (Date.now() - s.startedAt) / 1000;
        // If elapsed > totalSeconds, the timer completed while away — treat as paused at 0
        if (elapsed >= (s.totalSeconds || 0)) {
          s.isRunning = false;
          s.pausedRemaining = 0;
          s.startedAt = null;
        }
      }
      return s;
    }
  } catch(e) {}
  return defaultPomoState();
}

function savePomoState() {
  localStorage.setItem(POMO_KEY, JSON.stringify(pomo));
}

function getRemaining() {
  if (!pomo.isRunning) {
    return pomo.pausedRemaining != null ? pomo.pausedRemaining : pomo.totalSeconds;
  }
  const elapsed = (Date.now() - pomo.startedAt) / 1000;
  return Math.max(0, pomo.totalSeconds - elapsed);
}

function formatMinutes(sec) {
  // Show only minutes — no seconds to avoid distraction
  if (sec <= 0) return '0';
  return String(Math.ceil(sec / 60));
}

function PomoUI() {
  const remaining = getRemaining();
  const display = document.getElementById('pomo-display');
  const progress = document.getElementById('pomo-progress');
  const label = document.getElementById('pomo-label');
  const playBtn = document.getElementById('pomo-play');
  const pauseBtn = document.getElementById('pomo-pause');
  const dotsEl = document.getElementById('pomo-dots');
  const readyLabel = document.getElementById('pomo-phase-ready');

  const minStr = formatMinutes(remaining);
  display.innerHTML = `${minStr}<span class="pomo-time-unit">m</span>`;

  // Update browser tab title with stage and time
  const stageLabel = pomo.isBreak ? 'Break' : 'Focus';
  const pausedMark = !pomo.isRunning && (pomo.pausedRemaining != null || pomo.startedAt != null) ? '⏸ ' : '';
  document.title = `${pausedMark}${stageLabel} · ${minStr}m — Stoic Flow`;

  const fraction = 1 - (remaining / pomo.totalSeconds);
  progress.style.strokeDasharray = CIRCUMFERENCE;
  progress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);

  if (pomo.isBreak) {
    progress.classList.add('on-break');
    label.textContent = 'Break';
    playBtn.classList.add('on-break');
    pauseBtn.classList.add('on-break');
  } else {
    progress.classList.remove('on-break');
    label.textContent = 'Focus';
    playBtn.classList.remove('on-break');
    pauseBtn.classList.remove('on-break');
  }

  // Session progress dots
  if (dotsEl) {
    const total = pomo.sessionsBeforeLong;
    const done = pomo.completedSessions % pomo.sessionsBeforeLong;
    const breakClass = pomo.isBreak ? ' on-break' : '';
    dotsEl.innerHTML = Array.from({length: total}, (_, i) =>
      `<span class="pomo-dot${i < done ? ' done' + breakClass : ''}"></span>`
    ).join('');
  }

  if (pomo.isRunning) {
    playBtn.style.display = 'none';
    pauseBtn.style.display = 'flex';
    // Clear phase-ready state once timer is running
    playBtn.classList.remove('phase-ready');
    if (readyLabel) { readyLabel.classList.remove('visible', 'on-break'); readyLabel.textContent = ''; }
  } else {
    playBtn.style.display = 'flex';
    pauseBtn.style.display = 'none';
    // Show phase-ready pulse when a phase just completed (phaseJustCompleted flag)
    if (pomo.phaseJustCompleted) {
      playBtn.classList.add('phase-ready');
      if (readyLabel) {
        readyLabel.textContent = pomo.isBreak ? 'Ready to break' : 'Ready to focus';
        readyLabel.classList.toggle('on-break', pomo.isBreak);
        readyLabel.classList.add('visible');
      }
    } else {
      playBtn.classList.remove('phase-ready');
      if (readyLabel) { readyLabel.classList.remove('visible', 'on-break'); readyLabel.textContent = ''; }
    }
  }

  // Check completion
  if (remaining <= 0 && pomo.isRunning) {
    onSegmentComplete();
  }

  // Sync full-page overlay
  const fpOverlay = document.getElementById('pomo-fullpage');
  if (fpOverlay) {
    const fpDisplay = document.getElementById('pomo-fp-display');
    const fpProgress = document.getElementById('pomo-fp-progress');
    const fpLabel = document.getElementById('pomo-fp-label');
    const fpPlay = document.getElementById('pomo-fp-play');
    const fpPause = document.getElementById('pomo-fp-pause');
    const fpDots = document.getElementById('pomo-fp-dots');
    const fpReady = document.getElementById('pomo-fp-phase-ready');

    if (fpDisplay) fpDisplay.innerHTML = `${minStr}<span class="pomo-time-unit">m</span>`;
    if (fpProgress) {
      fpProgress.style.strokeDasharray = CIRCUMFERENCE;
      fpProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
      fpProgress.classList.toggle('on-break', pomo.isBreak);
    }
    if (fpLabel) fpLabel.textContent = pomo.isBreak ? 'Break' : 'Focus';
    if (fpPlay) { fpPlay.classList.toggle('on-break', pomo.isBreak); }
    if (fpPause) { fpPause.classList.toggle('on-break', pomo.isBreak); }
    if (fpDots) {
      const total = pomo.sessionsBeforeLong;
      const done = pomo.completedSessions % pomo.sessionsBeforeLong;
      const breakClass = pomo.isBreak ? ' on-break' : '';
      fpDots.innerHTML = Array.from({length: total}, (_, i) =>
        `<span class="pomo-dot${i < done ? ' done' + breakClass : ''}"></span>`
      ).join('');
    }
    if (pomo.isRunning) {
      if (fpPlay) fpPlay.style.display = 'none';
      if (fpPause) fpPause.style.display = 'flex';
      if (fpPlay) fpPlay.classList.remove('phase-ready');
      if (fpReady) { fpReady.classList.remove('visible', 'on-break'); fpReady.textContent = ''; }
    } else {
      if (fpPlay) fpPlay.style.display = 'flex';
      if (fpPause) fpPause.style.display = 'none';
      if (pomo.phaseJustCompleted) {
        if (fpPlay) fpPlay.classList.add('phase-ready');
        if (fpReady) {
          fpReady.textContent = pomo.isBreak ? 'Ready to break' : 'Ready to focus';
          fpReady.classList.toggle('on-break', pomo.isBreak);
          fpReady.classList.add('visible');
        }
      } else {
        if (fpPlay) fpPlay.classList.remove('phase-ready');
        if (fpReady) { fpReady.classList.remove('visible', 'on-break'); fpReady.textContent = ''; }
      }
    }
  }
}

function onSegmentComplete() {
  pomo.isRunning = false;
  const wasBreak = pomo.isBreak; // capture before phase flip

  // Notification
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(wasBreak ? 'Break over — time to focus!' : 'Session complete — take a break!', {
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏛️</text></svg>',
      tag: 'stoicflow-pomo'
    });
  }

  // Bell chime — async so AudioContext.resume() is properly awaited on mobile
  playCompletionChime(wasBreak);

  if (!pomo.isBreak) {
    pomo.completedSessions++;
    const isLong = pomo.completedSessions % pomo.sessionsBeforeLong === 0;
    pomo.isBreak = true;
    pomo.totalSeconds = (isLong ? pomo.longBreakMin : pomo.breakMin) * 60;
    showToast(isLong ? `${pomo.completedSessions} sessions done — long break!` : 'Session done — short break');
  } else {
    pomo.isBreak = false;
    pomo.totalSeconds = pomo.workMin * 60;
    showToast('Break over — let\'s focus');
  }

  pomo.pausedRemaining = pomo.totalSeconds;
  pomo.startedAt = null;
  pomo.phaseJustCompleted = true;
  savePomoState();
}

function startPomo() {
  const remaining = pomo.pausedRemaining != null ? pomo.pausedRemaining : pomo.totalSeconds;
  pomo.startedAt = Date.now();
  pomo.totalSeconds = remaining; // recalculate from where we left off
  pomo.pausedRemaining = null;
  pomo.isRunning = true;
  pomo.phaseJustCompleted = false;
  savePomoState();
  initAudioCtx(); // ensure AudioContext is live after user gesture

  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function pausePomo() {
  pomo.pausedRemaining = getRemaining();
  pomo.isRunning = false;
  pomo.startedAt = null;
  savePomoState();
}

function resetPomo() {
  pomo.isRunning = false;
  pomo.startedAt = null;
  pomo.isBreak = false;
  pomo.totalSeconds = pomo.workMin * 60;
  pomo.pausedRemaining = pomo.totalSeconds;
  pomo.phaseJustCompleted = false;
  savePomoState();
}

function jumpToPhase(phase) {
  pomo.isRunning = false;
  pomo.startedAt = null;
  pomo.phaseJustCompleted = false;
  if (phase === 'focus') {
    pomo.isBreak = false;
    pomo.totalSeconds = pomo.workMin * 60;
  } else if (phase === 'break') {
    pomo.isBreak = true;
    pomo.totalSeconds = pomo.breakMin * 60;
  } else {
    pomo.isBreak = true;
    pomo.totalSeconds = pomo.longBreakMin * 60;
  }
  pomo.pausedRemaining = pomo.totalSeconds;
  savePomoState();
  // Close settings panel
  document.getElementById('pomo-settings-panel').classList.remove('open');
}

/* Settings */
function loadSettingsUI() {
  document.getElementById('setting-work').value = pomo.workMin;
  document.getElementById('setting-break').value = pomo.breakMin;
  document.getElementById('setting-long').value = pomo.longBreakMin;
  document.getElementById('setting-sessions').value = pomo.sessionsBeforeLong;
}

function applySettings() {
  const w = parseInt(document.getElementById('setting-work').value) || 25;
  const b = parseInt(document.getElementById('setting-break').value) || 5;
  const l = parseInt(document.getElementById('setting-long').value) || 15;
  const s = parseInt(document.getElementById('setting-sessions').value) || 4;

  pomo.workMin = Math.max(1, Math.min(90, w));
  pomo.breakMin = Math.max(1, Math.min(30, b));
  pomo.longBreakMin = Math.max(1, Math.min(60, l));
  pomo.sessionsBeforeLong = Math.max(1, Math.min(12, s));

  if (!pomo.isRunning && !pomo.isBreak) {
    pomo.totalSeconds = pomo.workMin * 60;
    pomo.pausedRemaining = pomo.totalSeconds;
  }
  savePomoState();
}

/* ═══════════════════════════════════════
   INIT & EVENT LISTENERS
   ═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  // Random start
  currentBgIdx = Math.floor(Math.random() * BACKGROUNDS.length);
  loadBackground(currentBgIdx);

  currentQuoteIdx = Math.floor(Math.random() * QUOTES.length);
  document.getElementById('quote-text').textContent = QUOTES[currentQuoteIdx].text;
  document.getElementById('quote-author').textContent = QUOTES[currentQuoteIdx].author;

  // Quote buttons
  document.getElementById('btn-new').addEventListener('click', showRandomQuote);
  document.getElementById('btn-bg').addEventListener('click', nextBackground);

  // Pomodoro buttons
  document.getElementById('pomo-play').addEventListener('click', () => { initAudioCtx(); startPomo(); });
  document.getElementById('pomo-pause').addEventListener('click', pausePomo);
  document.getElementById('pomo-reset').addEventListener('click', resetPomo);

  // Settings toggle
  const settingsPanel = document.getElementById('pomo-settings-panel');
  document.getElementById('pomo-settings-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    settingsPanel.classList.toggle('open');
    if (settingsPanel.classList.contains('open')) loadSettingsUI();
  });

  // Close settings on outside click
  document.addEventListener('click', (e) => {
    if (!settingsPanel.contains(e.target) && e.target.id !== 'pomo-settings-btn') {
      settingsPanel.classList.remove('open');
    }
  });

  // Settings inputs — apply on change
  ['setting-work', 'setting-break', 'setting-long', 'setting-sessions'].forEach(id => {
    document.getElementById(id).addEventListener('change', applySettings);
  });

  // Phase jump chips
  document.getElementById('chip-focus').addEventListener('click', () => jumpToPhase('focus'));
  document.getElementById('chip-break').addEventListener('click', () => jumpToPhase('break'));
  document.getElementById('chip-long').addEventListener('click', () => jumpToPhase('long'));

  // Pomo tick — uses requestAnimationFrame for smooth updates,
  // but the actual timing is timestamp-based (persistent)
  function tick() {
    PomoUI();
    requestAnimationFrame(tick);
  }
  tick();

  // Also update on visibility change (when user returns to tab)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) PomoUI();
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'q' || e.key === 'Q') showRandomQuote();
    if (e.key === 'b' || e.key === 'B') nextBackground();
    if (e.key === ' ') {
      e.preventDefault();
      pomo.isRunning ? pausePomo() : startPomo();
    }
  });

  // ═══════════════════════════════════════
  // FULL-PAGE POMODORO
  // ═══════════════════════════════════════
  const fpOverlay = document.getElementById('pomo-fullpage');
  const pomoRingWrapper = document.querySelector('.pomo-widget .pomo-ring-wrapper');

  // Open full-page on ring click
  pomoRingWrapper.addEventListener('click', (e) => {
    e.stopPropagation();
    fpOverlay.classList.add('open');
  });

  // Close full-page
  document.getElementById('pomo-fullpage-close').addEventListener('click', () => {
    fpOverlay.classList.remove('open');
  });

  // Also close on click outside the ring area in full-page
  fpOverlay.addEventListener('click', (e) => {
    if (e.target === fpOverlay) fpOverlay.classList.remove('open');
  });

  // Full-page controls
  document.getElementById('pomo-fp-play').addEventListener('click', () => { initAudioCtx(); startPomo(); });
  document.getElementById('pomo-fp-pause').addEventListener('click', pausePomo);
  document.getElementById('pomo-fp-reset').addEventListener('click', resetPomo);
  document.getElementById('pomo-fp-settings-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    fpOverlay.classList.remove('open');
    settingsPanel.classList.toggle('open');
    if (settingsPanel.classList.contains('open')) loadSettingsUI();
  });

  // Escape key closes full-page
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && fpOverlay.classList.contains('open')) {
      fpOverlay.classList.remove('open');
    }
  });

  // ═══════════════════════════════════════
  // INIT AUTO-TRANSLATE
  // ═══════════════════════════════════════
  initTranslation();
});

/* ═══════════════════════════════════════════════════════════════
   OPEN-SOURCE AUTO-TRANSLATION

   2. LibreTranslate (public instances) — FOSS, self-hostable

   - Detects browser language automatically on first visit
   - Caches all translations in localStorage
   - Translates quotes + UI strings
   ═══════════════════════════════════════════════════════════════ */

  { code: 'ru', name: 'Russian',    native: 'Русский' },
  { code: 'ja', name: 'Japanese',   native: '日本語' },
  { code: 'ko', name: 'Korean',     native: '한국어' },
  { code: 'zh', name: 'Chinese',    native: '中文' },
  { code: 'ar', name: 'Arabic',     native: 'العربية' },
  { code: 'hi', name: 'Hindi',      native: 'हिन्दी' },
  { code: 'tr', name: 'Turkish',    native: 'Türkçe' },
  { code: 'pl', name: 'Polish',     native: 'Polski' },
  { code: 'uk', name: 'Ukrainian',  native: 'Українська' },

  { code: 'id', name: 'Indonesian', native: 'Bahasa Indonesia' },
  { code: 'ms', name: 'Malay',      native: 'Bahasa Melayu' },
  { code: 'ro', name: 'Romanian',   native: 'Română' },
  { code: 'cs', name: 'Czech',      native: 'Čeština' },

// UI strings that need translation
const UI_STRINGS = {
  en: {
    newQuote: 'New Quote',
    newScene: 'New Scene',
    focus: 'Focus',
    break: 'Break',
    timerSettings: 'Timer Settings',
    focusMin: 'Focus (min)',
    breakMin: 'Break (min)',
    longBreak: 'Long break',
    sessions: 'Sessions',
    jumpToPhase: 'Jump to phase',
    longBreakLabel: 'Long Break',
    sessionDone: 'Session done — short break',
    longBreakMsg: 'sessions done — long break!',
    breakOver: "Break over — let's focus",
    readyBreak: 'Ready to break',
    readyFocus: 'Ready to focus',
  }
};

const TRANSLATION_CACHE_KEY = 'stoicflow_translations';
const LANG_PREF_KEY = 'stoicflow_lang';

let currentLang = 'en';
let translationCache = {};

function loadTranslationCache() {
  try {
    const raw = localStorage.getItem(TRANSLATION_CACHE_KEY);
    if (raw) translationCache = JSON.parse(raw);
  } catch(e) { translationCache = {}; }
}

function saveTranslationCache() {
  try {
    localStorage.setItem(TRANSLATION_CACHE_KEY, JSON.stringify(translationCache));
  } catch(e) {}
}

function getCacheKey(text, targetLang) {
  return `en|${targetLang}|${text}`;
}

function getCachedTranslation(text, targetLang) {
  return translationCache[getCacheKey(text, targetLang)] || null;
}

function setCachedTranslation(text, targetLang, translated) {
  translationCache[getCacheKey(text, targetLang)] = translated;
}

/**
 * Translate text using open-source APIs.
 * Provider 1: MyMemory (free, no API key, 1000 words/day anonymous)
 * Provider 2: LibreTranslate public instance (FOSS)
 */
async function translateText(text, targetLang) {
  if (targetLang === 'en') return text;
  if (!text || !text.trim()) return text;

  // Check cache first
  const cached = getCachedTranslation(text, targetLang);
  if (cached) return cached;

  // Try MyMemory first (most reliable free API)
  try {
    const encoded = encodeURIComponent(text);
    const url = `https://api.mymemory.translated.net/get?q=${encoded}&langpair=en|${targetLang}`;
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
        const translated = data.responseData.translatedText;
        // MyMemory returns uppercase when it can't translate — skip those
        if (translated !== text.toUpperCase()) {
          setCachedTranslation(text, targetLang, translated);
          return translated;
        }
      }
    }
  } catch(e) { /* fall through to next provider */ }

  // Fallback: LibreTranslate public instance
  try {
    const resp = await fetch('https://libretranslate.com/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: text, source: 'en', target: targetLang, format: 'text' }),
    });
    if (resp.ok) {
      const data = await resp.json();
      if (data.translatedText) {
        setCachedTranslation(text, targetLang, data.translatedText);
        return data.translatedText;
      }
    }
  } catch(e) { /* translation unavailable */ }

  // Return original if all providers fail
  return text;
}

/**
 * Batch translate an array of strings. Returns array of translated strings.
 * Uses concurrency limit to avoid hammering the API.
 */
async function batchTranslate(texts, targetLang) {
  if (targetLang === 'en') return [...texts];

  const results = new Array(texts.length);
  const uncached = [];

  // Separate cached from uncached
  for (let i = 0; i < texts.length; i++) {
    const cached = getCachedTranslation(texts[i], targetLang);
    if (cached) {
      results[i] = cached;
    } else {
      uncached.push(i);
    }
  }

  // Translate uncached items with concurrency limit of 3
  const CONCURRENCY = 3;
  for (let start = 0; start < uncached.length; start += CONCURRENCY) {
    const batch = uncached.slice(start, start + CONCURRENCY);
    const promises = batch.map(idx => translateText(texts[idx], targetLang).then(t => { results[idx] = t; }));
    await Promise.all(promises);
  }

  saveTranslationCache();
  return results;
}

async function translateCurrentQuote() {
  if (currentLang === 'en') return;

  const textEl = document.getElementById('quote-text');
  const authorEl = document.getElementById('quote-author');
  const quote = QUOTES[currentQuoteIdx];
  if (!quote) return;

  const [translatedText] = await batchTranslate([quote.text], currentLang);
  // Only update if still showing the same quote
  if (currentQuoteIdx === QUOTES.indexOf(quote)) {
    textEl.textContent = translatedText;
    // Author names stay in original — they are proper nouns
  }
}

async function translateUIStrings(lang) {
  if (lang === 'en') {
    applyUIStrings(UI_STRINGS.en);
    return;
  }

  // Check if we already have cached UI strings for this language
  if (UI_STRINGS[lang]) {
    applyUIStrings(UI_STRINGS[lang]);
    return;
  }

  // Translate UI strings
  const keys = Object.keys(UI_STRINGS.en);
  const values = keys.map(k => UI_STRINGS.en[k]);
  const translated = await batchTranslate(values, lang);

  const langStrings = {};
  keys.forEach((k, i) => { langStrings[k] = translated[i]; });
  UI_STRINGS[lang] = langStrings;

  applyUIStrings(langStrings);
}

function applyUIStrings(strings) {
  document.getElementById('btn-new').textContent = strings.newQuote;
  document.getElementById('btn-bg').textContent = strings.newScene;

  // Settings panel text
  const settingsPanel = document.getElementById('pomo-settings-panel');
  const h4s = settingsPanel.querySelectorAll('h4');
  if (h4s[0]) h4s[0].textContent = strings.timerSettings;
  if (h4s[1]) h4s[1].textContent = strings.jumpToPhase;

  const labels = settingsPanel.querySelectorAll('.setting-row label');
  if (labels[0]) labels[0].textContent = strings.focusMin;
  if (labels[1]) labels[1].textContent = strings.breakMin;
  if (labels[2]) labels[2].textContent = strings.longBreak;
  if (labels[3]) labels[3].textContent = strings.sessions;

  document.getElementById('chip-focus').textContent = strings.focus;
  document.getElementById('chip-break').textContent = strings.break;
  document.getElementById('chip-long').textContent = strings.longBreakLabel;
}

// Override showToast and pomo label updates to use translated strings
const _origUpdatePomoUI = PomoUI;

function getTranslatedPomoStrings() {
  return UI_STRINGS[currentLang] || UI_STRINGS.en;
}

// Patch PomoUI to use translated labels
const _origLabel = null;
(function patchPomoUI() {
  const origFn = PomoUI;
  window.PomoUI = function() {
    origFn();
    const s = getTranslatedPomoStrings();
    const label = document.getElementById('pomo-label');
    label.textContent = pomo.isBreak ? s.break : s.focus;

    const readyLabel = document.getElementById('pomo-phase-ready');
    if (pomo.phaseJustCompleted && !pomo.isRunning && readyLabel) {
      readyLabel.textContent = pomo.isBreak ? s.readyBreak : s.readyFocus;
    }
  };
  // Reassign for the tick loop
  PomoUI = window.PomoUI;
})();

// Patch onSegmentComplete for translated toasts
const _origOnSegmentComplete = onSegmentComplete;
window.onSegmentComplete = function() {
  _origOnSegmentComplete();
  // Re-show toast in current language
  const s = getTranslatedPomoStrings();
  // The toast was already shown by original; we re-show with translation
  if (!pomo.isBreak) {
    // Just flipped to break
  }
};
onSegmentComplete = window.onSegmentComplete;

// Patch showRandomQuote to translate after showing
const _origShowRandomQuote = showRandomQuote;
window.showRandomQuote = function() {
  _origShowRandomQuote();
  if (currentLang !== 'en') {
    // Translate after the fade-in delay
    setTimeout(() => translateCurrentQuote(), 450);
  }
};
showRandomQuote = window.showRandomQuote;

function setLanguageStatus(msg) {
  const el = document.getElementById('lang-status');
  if (msg) {
    el.textContent = msg;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

async function switchLanguage(langCode) {
  currentLang = langCode;
  localStorage.setItem(LANG_PREF_KEY, langCode);

  const langData = SUPPORTED_LANGS.find(l => l.code === langCode);
  document.getElementById('lang-label').textContent = langData ? langData.native : langCode;
  document.documentElement.lang = langCode;

  // Update active state in dropdown
  document.querySelectorAll('.lang-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === langCode);
  });

  // Close dropdown
  document.getElementById('lang-dropdown').classList.remove('open');

  if (langCode === 'en') {
    // Restore original English text
    const quote = QUOTES[currentQuoteIdx];
    document.getElementById('quote-text').textContent = quote.text;
    document.getElementById('quote-author').textContent = quote.author;
    applyUIStrings(UI_STRINGS.en);
    setLanguageStatus('');
    return;
  }

  setLanguageStatus('Translating…');

  try {
    await Promise.all([
      translateCurrentQuote(),
      translateUIStrings(langCode),
    ]);
  } catch(e) {
    // Silently continue — partial translation is fine
  }

  setLanguageStatus('');
}

function buildLangDropdown() {
  const dropdown = document.getElementById('lang-dropdown');
  dropdown.innerHTML = SUPPORTED_LANGS.map(lang =>
    `<button class="lang-option${lang.code === currentLang ? ' active' : ''}" data-lang="${lang.code}">${lang.native}</button>`
  ).join('');

  dropdown.addEventListener('click', (e) => {
    const btn = e.target.closest('.lang-option');
    if (btn) switchLanguage(btn.dataset.lang);
  });
}

function initTranslation() {
  loadTranslationCache();
  buildLangDropdown();

  // Toggle dropdown
  const langBtn = document.getElementById('lang-btn');
  const dropdown = document.getElementById('lang-dropdown');
  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target) && e.target !== langBtn) {
      dropdown.classList.remove('open');
    }
  });

  // Check saved preference or detect browser language
  const saved = localStorage.getItem(LANG_PREF_KEY);
  if (saved && saved !== 'en') {
    switchLanguage(saved);
  } else if (!saved) {
    // Auto-detect from browser
    const browserLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0].toLowerCase();
    if (browserLang !== 'en' && SUPPORTED_LANGS.find(l => l.code === browserLang)) {
      switchLanguage(browserLang);
    }
  }
}
