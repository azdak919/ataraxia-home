name: Auto Bump Patch Version on PR Merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-patch:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Read and increment patch version
        id: ver
        run: |
          CURRENT=$(grep -oP "(?<=const VERSION = 'v)[^']+" js/version.js)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "NEW_VERSION=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping from v${CURRENT} to ${NEW_VERSION}"

      - name: Update VERSION in js/version.js
        run: |
          sed -i "s/const VERSION = 'v[^']*'/const VERSION = '${{ steps.ver.outputs.NEW_VERSION }}'/" js/version.js

      - name: Verify the replacement landed
        run: grep "const VERSION" js/version.js

      - name: Commit, tag, and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/version.js
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.ver.outputs.NEW_VERSION }}"
          git tag ${{ steps.ver.outputs.NEW_VERSION }}
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.NEW_VERSION }}
          name: "Ataraxia ${{ steps.ver.outputs.NEW_VERSION }}"
          generate_release_notes: true
