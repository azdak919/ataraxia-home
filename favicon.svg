<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Modern 2026 warm neutral palette matching Ataraxia's calm aesthetic -->
    <radialGradient id="bg" cx="42%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#e8d9c8"/>
      <stop offset="52%" stop-color="#b89a7a"/>
      <stop offset="100%" stop-color="#6f523a"/>
    </radialGradient>
    
    <!-- Very subtle contemporary inner light (less 2018 glow, more refined presence) -->
    <radialGradient id="innerLight" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#f8f3eb" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f8f3eb" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Precise, elegant ring system -->
    <linearGradient id="ringMain" x1="18%" y1="22%" x2="82%" y2="78%">
      <stop offset="0%" stop-color="#f8f3eb" stop-opacity="0.55"/>
      <stop offset="48%" stop-color="#f8f3eb" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#f8f3eb" stop-opacity="0.48"/>
    </linearGradient>
  </defs>

  <!-- Main background — calmer, more sophisticated gradient -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  
  <!-- Subtle contemporary light bloom (2026 minimalist depth) -->
  <circle cx="256" cy="256" r="248" fill="url(#innerLight)"/>
  
  <!-- Primary precise ring -->
  <circle 
    cx="256" cy="256" r="230" 
    fill="none" 
    stroke="url(#ringMain)" 
    stroke-width="1.75" 
    stroke-linecap="round"/>
  
  <!-- Secondary inner ring for quiet hierarchy -->
  <circle 
    cx="256" cy="256" r="188" 
    fill="none" 
    stroke="#f8f3eb" 
    stroke-width="1.25" 
    stroke-opacity="0.18"/>
  
  <!-- The "A" — refined 2026 execution: tighter proportions, better optical balance, modern calm serif feel -->
  <!-- Using system serif stack for reliability + letter-spacing tuned for icon scale -->
  <text 
    x="256" 
    y="295" 
    text-anchor="middle" 
    dominant-baseline="middle"
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="232" 
    font-weight="400" 
    fill="#f8f3eb" 
    letter-spacing="-9"
    opacity="0.96">A</text>
  
  <!-- Tiny, precise presence mark (the quiet "now" — very 2026 stoic minimalism) -->
  <circle cx="256" cy="352" r="2.75" fill="#f8f3eb" opacity="0.28"/>
</svg>
