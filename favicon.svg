<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#d4b896"/>
      <stop offset="60%" stop-color="#a8845c"/>
      <stop offset="100%" stop-color="#6b4f32"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#f5f0eb" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f5f0eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0eb" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#f5f0eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f5f0eb" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3a2a18" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Background circle with rich gradient -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>
  <!-- Subtle inner glow -->
  <circle cx="256" cy="256" r="248" fill="url(#glow)"/>
  <!-- Decorative outer ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="url(#ring)" stroke-width="2.5" opacity="0.5"/>
  <!-- Small corner accents on the inner ring (4 dots) -->
  <circle cx="256" cy="64" r="3" fill="#f5f0eb" opacity="0.35"/>
  <circle cx="256" cy="448" r="3" fill="#f5f0eb" opacity="0.35"/>
  <circle cx="64" cy="256" r="3" fill="#f5f0eb" opacity="0.25"/>
  <circle cx="448" cy="256" r="3" fill="#f5f0eb" opacity="0.25"/>
  <!-- Letter A with refined styling -->
  <text x="256" y="300" text-anchor="middle" font-family="'Garamond','Georgia','Times New Roman',serif" font-size="240" font-weight="400" fill="#f5f0eb" letter-spacing="-6" filter="url(#shadow)" opacity="0.92">A</text>
  <!-- Subtle bottom line accent -->
  <line x1="196" y1="340" x2="316" y2="340" stroke="#f5f0eb" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
</svg>
