/* ═══════════════════════════════════════
   POMODORO TIMER — PERSISTENT
   Uses timestamps so it keeps running
   even when the tab is hidden or closed.
   State is persisted to localStorage.
   ═══════════════════════════════════════ */
const POMO_KEY = 'stoicflow_pomo';
const CIRCUMFERENCE = 2 * Math.PI * 52; // ~326.73  (r=52 in 120×120 viewBox)

/* ── Shared AudioContext (created on first user gesture) ── */
let _audioCtx = null;
function initAudioCtx() {
  if (_audioCtx) return _audioCtx;
  try {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {}
  return _audioCtx;
}

/* ── Screen Wake Lock — keeps screen on while timer runs so audio fires reliably ── */
let _wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator && document.visibilityState === 'visible') {
      _wakeLock = await navigator.wakeLock.request('screen');
      _wakeLock.addEventListener('release', () => { _wakeLock = null; });
    }
  } catch(e) {}
}
async function releaseWakeLock() {
  try { if (_wakeLock) { await _wakeLock.release(); _wakeLock = null; } } catch(e) {}
}

/* ══════════════════════════════════════════════════════════════
   AUDIO SYSTEM — platform-specific keepalive + completion chime

   Three platforms, same goal: play an audible chime when the
   timer completes, even from the background.

   ┌──────────┬───────────────────────┬──────────────────────────┐
   │ Platform │ Keepalive             │ Chime                    │
   ├──────────┼───────────────────────┼──────────────────────────┤
   │ iOS      │ <audio> loop (only    │ Web Audio API synthesis  │
   │          │ way to prevent tab    │ (audio session already   │
   │          │ suspension)           │ held by keepalive)       │
   ├──────────┼───────────────────────┼──────────────────────────┤
   │ Android  │ OscillatorNode (no    │ <audio> + pre-rendered   │
   │          │ audio focus steal)    │ WAV (claims transient    │
   │          │                       │ focus → ducks Waze etc.) │
   ├──────────┼───────────────────────┼──────────────────────────┤
   │ Desktop  │ OscillatorNode        │ <audio> + pre-rendered   │
   │          │                       │ WAV (reliable in bg tabs)│
   └──────────┴───────────────────────┴──────────────────────────┘

   Keepalive uses 19.5 kHz (above human hearing) — inaudible.
   ══════════════════════════════════════════════════════════════ */

const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const _isAndroid = /Android/i.test(navigator.userAgent);

/* ── WAV encoding helper ── */
function _encodeWav(samples, sampleRate) {
  const n = samples.length;
  const buf = new ArrayBuffer(44 + n * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + n*2, true); w(8,'WAVE');
  w(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,1,true);
  v.setUint16(22,1,true); v.setUint32(24,sampleRate,true);
  v.setUint32(28,sampleRate*2,true); v.setUint16(32,2,true);
  v.setUint16(34,16,true); w(36,'data'); v.setUint32(40,n*2,true);
  for (let i = 0; i < n; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i*2, (s < 0 ? s * 0x8000 : s * 0x7FFF) | 0, true);
  }
  return new Blob([buf], { type: 'audio/wav' });
}

/* ── Keepalive state ── */
let _timerAudio = null;   // <audio> element (iOS)
let _timerBlobUrl = null;  // blob URL for iOS WAV
let _keepaliveOsc = null;  // OscillatorNode (Android/Desktop)
let _keepaliveGain = null; // GainNode for the oscillator

function _generateKeepaliveWav() {
  // 2-second loop at 44.1 kHz — ultrasonic 19.5 kHz sine, ~86 KB
  const sr = 44100;
  const dur = 2;
  const n = sr * dur;
  const samples = new Float32Array(n);
  const freq = 19500;
  for (let i = 0; i < n; i++) {
    samples[i] = Math.sin(2 * Math.PI * freq * i / sr) * 0.001;
  }
  return _encodeWav(samples, sr);
}

/* ── Pre-render bowl-tone chime to WAV (Android + Desktop) ── */
function _renderChimeWav(wasBreak) {
  const sr = 44100;
  const dur = wasBreak ? 4 : 5; // seconds — enough for full decay
  const n = sr * dur;
  const buf = new Float32Array(n);

  // Same bowl-tone parameters as the Web Audio synthesis version:
  // partials at [1×, 2.756×, 5.404×] with relative volumes [1, 0.28, 0.12]
  const partials = [[1, 1], [2.756, 0.28], [5.404, 0.12]];

  function addTone(freq, startSec, vol, decaySec) {
    const attackSec = 0.008;
    const startSample = Math.round(startSec * sr);
    const endSample = Math.min(Math.round((startSec + decaySec) * sr), n);
    const attackSamples = Math.round(attackSec * sr);
    // Exponential decay: from vol to 0.0001 over decaySec
    // vol * e^(-k*t) = 0.0001  =>  k = ln(vol/0.0001) / decaySec
    const k = Math.log(vol / 0.0001) / decaySec;

    for (let p = 0; p < partials.length; p++) {
      const pFreq = freq * partials[p][0];
      const pVol = partials[p][1];
      for (let i = startSample; i < endSample; i++) {
        const t = (i - startSample) / sr; // time since tone start
        // Envelope: linear attack, then exponential decay
        let env;
        if (t < attackSec) {
          env = vol * (t / attackSec); // linear ramp up
        } else {
          env = vol * Math.exp(-k * t); // exponential decay
        }
        buf[i] += Math.sin(2 * Math.PI * pFreq * t) * env * pVol;
      }
    }
  }

  if (wasBreak) {
    addTone(783.99, 0,    0.18, 3.0);  // G5 descending
    addTone(659.25, 0.45, 0.12, 2.6);  // E5
  } else {
    addTone(523.25, 0,    0.20, 3.8);  // C5 ascending
    addTone(659.25, 0.50, 0.16, 3.4);  // E5
    addTone(783.99, 1.00, 0.13, 3.0);  // G5
  }

  // Clamp to [-1, 1]
  for (let i = 0; i < n; i++) {
    if (buf[i] > 1) buf[i] = 1;
    else if (buf[i] < -1) buf[i] = -1;
  }

  return _encodeWav(buf, sr);
}

/* ── iOS: full-duration WAV — ultrasonic silence + chime at the end ──
   The WAV spans the entire timer. iOS shows it in Now Playing / lock screen
   with a progress bar = time remaining. The chime is baked into the last
   few seconds so no separate synthesis is needed at completion.           ── */
function _renderFullTimerWav(remainingSec, isBreak) {
  const sr = 44100;
  const n = sr * remainingSec;
  const buf = new Float32Array(n);

  // Fill with ultrasonic 19.5 kHz sine at near-zero amplitude (keepalive)
  const freq = 19500;
  for (let i = 0; i < n; i++) {
    buf[i] = Math.sin(2 * Math.PI * freq * i / sr) * 0.001;
  }

  // Overlay bowl-tone chime at the end
  const chimeDur = isBreak ? 4 : 5;
  const chimeStartSample = Math.max(0, n - sr * chimeDur);
  const partials = [[1, 1], [2.756, 0.28], [5.404, 0.12]];

  function addTone(baseFreq, startSec, vol, decaySec) {
    const attackSec = 0.008;
    const startSample = chimeStartSample + Math.round(startSec * sr);
    const endSample = Math.min(chimeStartSample + Math.round((startSec + decaySec) * sr), n);
    const k = Math.log(vol / 0.0001) / decaySec;
    for (let p = 0; p < partials.length; p++) {
      const pFreq = baseFreq * partials[p][0];
      const pVol = partials[p][1];
      for (let i = startSample; i < endSample; i++) {
        const t = (i - startSample) / sr;
        let env;
        if (t < attackSec) {
          env = vol * (t / attackSec);
        } else {
          env = vol * Math.exp(-k * t);
        }
        buf[i] += Math.sin(2 * Math.PI * pFreq * t) * env * pVol;
      }
    }
  }

  if (isBreak) {
    addTone(783.99, 0,    0.18, 3.0);  // G5 descending
    addTone(659.25, 0.45, 0.12, 2.6);  // E5
  } else {
    addTone(523.25, 0,    0.20, 3.8);  // C5 ascending
    addTone(659.25, 0.50, 0.16, 3.4);  // E5
    addTone(783.99, 1.00, 0.13, 3.0);  // G5
  }

  // Clamp to [-1, 1]
  for (let i = 0; i < n; i++) {
    if (buf[i] > 1) buf[i] = 1;
    else if (buf[i] < -1) buf[i] = -1;
  }

  return _encodeWav(buf, sr);
}

function startTimerAudio(remainingSec) {
  stopTimerAudio();

  if (_isIOS) {
    // iOS: single full-duration WAV — ultrasonic silence + chime at the end.
    // iOS shows this in Now Playing / lock screen with a progress bar = time remaining.
    // audioSession 'ambient' allows mixing with Spotify / music (iOS 17.2+).
    try {
      if (navigator.audioSession) {
        try { navigator.audioSession.type = 'ambient'; } catch(e) {}
      }
      const blob = _renderFullTimerWav(remainingSec, pomo.isBreak);
      _timerBlobUrl = URL.createObjectURL(blob);
      _timerAudio = new Audio(_timerBlobUrl);
      _timerAudio.volume = 1.0;
      _timerAudio.loop = false;
      _timerAudio.addEventListener('ended', function() {
        // Chime has finished — release audio session cleanly
        stopTimerAudio();
      });
      var p = _timerAudio.play();
      if (p) p.catch(function() {});
    } catch(e) {}
  } else {
    // Android/Desktop: Web Audio API oscillator — does NOT steal audio focus
    try {
      const ctx = initAudioCtx();
      if (ctx) {
        if (ctx.state === 'suspended') ctx.resume();
        _keepaliveGain = ctx.createGain();
        _keepaliveGain.gain.value = 0.001; // minimal amplitude
        _keepaliveGain.connect(ctx.destination);
        _keepaliveOsc = ctx.createOscillator();
        _keepaliveOsc.type = 'sine';
        _keepaliveOsc.frequency.value = 19500; // ultrasonic — inaudible
        _keepaliveOsc.connect(_keepaliveGain);
        _keepaliveOsc.start();
      }
    } catch(e) {}
  }

  _updateMediaSession();
}

function stopTimerAudio() {
  // Stop iOS <audio> keepalive
  if (_timerAudio) {
    try { _timerAudio.pause(); _timerAudio.removeAttribute('src'); _timerAudio.load(); } catch(e) {}
    _timerAudio = null;
  }
  if (_timerBlobUrl) { try { URL.revokeObjectURL(_timerBlobUrl); } catch(e) {} _timerBlobUrl = null; }
  // Stop Android/Desktop oscillator keepalive
  if (_keepaliveOsc) {
    try { _keepaliveOsc.stop(); } catch(e) {}
    _keepaliveOsc = null;
  }
  if (_keepaliveGain) {
    try { _keepaliveGain.disconnect(); } catch(e) {}
    _keepaliveGain = null;
  }
  try { if ('mediaSession' in navigator) navigator.mediaSession.metadata = null; } catch(e) {}
}

/* ── Media Session API — shows timer in iOS lock screen / control center ── */
function _updateMediaSession() {
  if (!('mediaSession' in navigator)) return;
  try {
    const phase = pomo.isBreak ? (pomo.isLongBreak ? 'Long Break' : 'Break') : 'Focus';
    const remaining = formatMinutes(getRemaining());
    navigator.mediaSession.metadata = new MediaMetadata({
      title: phase + ' · ' + remaining + 'm remaining',
      artist: 'Ataraxia Pomodoro',
      artwork: [
        { src: 'icon-192.png', sizes: '192x192', type: 'image/png' },
        { src: 'icon-512.png', sizes: '512x512', type: 'image/png' }
      ]
    });
    navigator.mediaSession.setActionHandler('pause', () => stopPomo());
    navigator.mediaSession.setActionHandler('play', () => startPomo());
    // Position state — shows progress bar / countdown on iOS lock screen
    if (navigator.mediaSession.setPositionState && _timerAudio && _timerAudio.duration) {
      const totalDur = pomo.phaseDuration || pomo.totalSeconds;
      const elapsed = totalDur - getRemaining();
      navigator.mediaSession.setPositionState({
        duration: totalDur,
        playbackRate: 1,
        position: Math.max(0, Math.min(elapsed, totalDur))
      });
    }
  } catch(e) {}
}

/* ── Completion chime — platform-specific playback ──
   iOS:     Chime is baked into the full-duration WAV played by
            startTimerAudio() — no separate playback needed here.
   Android: Pre-rendered WAV via <audio> element — claims transient audio
            focus (AUDIOFOCUS_GAIN_TRANSIENT_MAY_DUCK), ducking Waze /
            Spotify / podcasts briefly, then releasing.
   Desktop: Pre-rendered WAV via <audio> element — browsers treat <audio>
            as first-class media, reliable even in background tabs.
   ── */
async function playCompletionChime(wasBreak) {
  try {
    if (_isIOS) {
      // ── iOS: chime is baked into the full-duration timer WAV ──
      // If the WAV is still playing, the chime will sound naturally at the end.
      // If it was interrupted (call, audio session killed), fall through and play chime directly.
      if (_timerAudio && !_timerAudio.paused && !_timerAudio.ended) {
        return;
      }
      // WAV was interrupted — play the chime via a fresh <audio> element as fallback
      const blob = _renderChimeWav(wasBreak);
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.volume = 1.0;
      const cleanup = () => {
        try { audio.pause(); audio.removeAttribute('src'); audio.load(); URL.revokeObjectURL(url); } catch(e) {}
      };
      audio.addEventListener('ended', cleanup);
      audio.addEventListener('error', cleanup);
      const p = audio.play();
      if (p) p.catch(() => cleanup());
      return;

    } else if (_isAndroid) {
      // ── Android: <audio> element with pre-rendered WAV ──
      // Resume AudioContext first — Chrome Android may suspend it in background,
      // which can also block HTMLAudioElement.play().
      if (_audioCtx && _audioCtx.state === 'suspended') {
        try { await _audioCtx.resume(); } catch(e) {}
      }
      const blob = _renderChimeWav(wasBreak);
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.volume = 1.0;
      const cleanup = () => {
        try {
          audio.pause();
          audio.removeAttribute('src');
          audio.load(); // forces Android Chrome to release audio focus
          URL.revokeObjectURL(url);
        } catch(e) {}
      };
      audio.addEventListener('ended', () => { cleanup(); stopTimerAudio(); });
      audio.addEventListener('error', () => { cleanup(); stopTimerAudio(); });
      var p = audio.play();
      if (p) p.catch(async () => {
        // HTMLAudioElement rejected (autoplay policy or audio focus lost) —
        // fall back to Web Audio API oscillator which bypasses autoplay restrictions
        // once the AudioContext has been resumed with a prior user gesture.
        cleanup();
        try {
          const ctx = initAudioCtx();
          if (ctx) {
            if (ctx.state === 'suspended') await ctx.resume();
            if (ctx.state === 'running') {
              const now = ctx.currentTime;
              const tones = wasBreak ? [523, 659, 784] : [784, 659, 523]; // C5-E5-G5
              tones.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                const t = now + i * 0.3;
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
                osc.start(t);
                osc.stop(t + 1.2);
              });
            }
          }
        } catch(e2) {}
        stopTimerAudio();
      });

    } else {
      // ── Desktop (Windows / Mac / Linux): <audio> element with pre-rendered WAV ──
      // Browsers treat <audio> as first-class media that the OS audio
      // mixer respects regardless of tab focus — more reliable than
      // Web Audio API for background tabs.
      const blob = _renderChimeWav(wasBreak);
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.volume = 1.0;
      const cleanup = () => {
        try {
          audio.pause();
          audio.removeAttribute('src');
          audio.load();
          URL.revokeObjectURL(url);
        } catch(e) {}
      };
      audio.addEventListener('ended', () => { cleanup(); stopTimerAudio(); });
      audio.addEventListener('error', () => { cleanup(); stopTimerAudio(); });
      var p = audio.play();
      if (p) p.catch(() => { cleanup(); stopTimerAudio(); });
    }
  } catch(e) {}
}

let pomo = loadPomoState();

function defaultPomoState() {
  return {
    workMin: 25,
    breakMin: 5,
    longBreakMin: 15,
    sessionsBeforeLong: 4,
    completedSessions: 0,
    isRunning: false,
    isBreak: false,
    startedAt: null,       // timestamp when current segment started
    pausedRemaining: null, // seconds remaining when paused
    totalSeconds: 25 * 60,
    phaseDuration: 25 * 60, // full duration of the current phase (for stop/reset)
    isLongBreak: false,
  };
}

function loadPomoState() {
  try {
    const raw = localStorage.getItem(POMO_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      if (typeof s.workMin !== 'number') return defaultPomoState();
      // If stored as running with a startedAt, verify it's a valid timestamp
      if (s.isRunning && s.startedAt) {
        const elapsed = (Date.now() - s.startedAt) / 1000;
        // If elapsed > totalSeconds, the timer completed while the page was gone — advance phase
        if (elapsed >= (s.totalSeconds || 0)) {
          s.isRunning = false;
          s.startedAt = null;
          s.phaseJustCompleted = true;
          if (!s.isBreak) {
            s.completedSessions = (s.completedSessions || 0) + 1;
            const isLong = s.completedSessions % (s.sessionsBeforeLong || 4) === 0;
            s.isBreak = true;
            s.isLongBreak = isLong;
            s.totalSeconds = (isLong ? s.longBreakMin : s.breakMin) * 60;
          } else {
            s.isBreak = false;
            s.isLongBreak = false;
            s.totalSeconds = s.workMin * 60;
          }
          s.phaseDuration = s.totalSeconds;
          s.pausedRemaining = s.totalSeconds;
        }
      }
      return s;
    }
  } catch(e) {}
  return defaultPomoState();
}

function savePomoState() {
  localStorage.setItem(POMO_KEY, JSON.stringify(pomo));
}

function getRemaining() {
  if (!pomo.isRunning) {
    return pomo.pausedRemaining != null ? pomo.pausedRemaining : pomo.totalSeconds;
  }
  const elapsed = (Date.now() - pomo.startedAt) / 1000;
  return Math.max(0, pomo.totalSeconds - elapsed);
}

function formatMinutes(sec) {
  // Show only minutes — no seconds to avoid distraction
  if (sec <= 0) return '0';
  return String(Math.ceil(sec / 60));
}

function PomoUI() {
  const remaining = getRemaining();
  const display = document.getElementById('pomo-display');
  const progress = document.getElementById('pomo-progress');
  const label = document.getElementById('pomo-label');
  const playBtn = document.getElementById('pomo-play');
  const pauseBtn = document.getElementById('pomo-pause');
  const dotsEl = document.getElementById('pomo-dots');
  const readyLabel = document.getElementById('pomo-phase-ready');

  const minStr = formatMinutes(remaining);
  display.innerHTML = `${minStr}<span class="pomo-time-unit">m</span>`;

  // Update mini indicator for minimized state
  const miniTime = document.getElementById('pomo-mini-time');
  const miniDot = document.getElementById('pomo-mini-dot');
  if (miniTime) miniTime.textContent = minStr + 'm';
  if (miniDot) miniDot.classList.toggle('on-break', pomo.isBreak);

  // Update browser tab title with stage and time (emojis for quick recognition)
  const stageLabel = pomo.isBreak ? (pomo.isLongBreak ? 'Long Break' : 'Break') : 'Focus';
  const stageEmoji = pomo.isBreak ? (pomo.isLongBreak ? '🌿' : '☕') : '🎯';
  const pausedMark = !pomo.isRunning && (pomo.pausedRemaining != null || pomo.startedAt != null) ? '⏸ ' : '';
  document.title = `${pausedMark}${stageEmoji} ${stageLabel} · ${minStr}m · Ataraxia`;

  const fraction = 1 - (remaining / pomo.totalSeconds);
  progress.style.strokeDasharray = CIRCUMFERENCE;
  progress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);

  if (pomo.isBreak) {
    progress.classList.add('on-break');
    label.textContent = pomo.isLongBreak ? 'Long Break' : 'Break';
    playBtn.classList.add('on-break');
    pauseBtn.classList.add('on-break');
  } else {
    progress.classList.remove('on-break');
    label.textContent = 'Focus';
    playBtn.classList.remove('on-break');
    pauseBtn.classList.remove('on-break');
  }

  // Session progress dots
  if (dotsEl) {
    const total = pomo.sessionsBeforeLong;
    const done = pomo.completedSessions % pomo.sessionsBeforeLong;
    const breakClass = pomo.isBreak ? ' on-break' : '';
    dotsEl.innerHTML = Array.from({length: total}, (_, i) =>
      `<span class="pomo-dot${i < done ? ' done' + breakClass : ''}"></span>`
    ).join('');
  }

  // Check completion FIRST so pomo.isRunning is correct when we toggle buttons below
  if (remaining <= 0 && pomo.isRunning) {
    onSegmentComplete();
  }

  if (pomo.isRunning) {
    playBtn.style.display = 'none';
    pauseBtn.style.display = 'flex';
    // Clear phase-ready state once timer is running
    playBtn.classList.remove('phase-ready');
    if (readyLabel) { readyLabel.classList.remove('visible', 'on-break'); readyLabel.textContent = ''; }
  } else {
    playBtn.style.display = 'flex';
    pauseBtn.style.display = 'none';
    // Show phase-ready pulse when a phase just completed (phaseJustCompleted flag)
    if (pomo.phaseJustCompleted) {
      playBtn.classList.add('phase-ready');
      if (readyLabel) {
        readyLabel.textContent = pomo.isBreak ? 'Ready to break' : 'Ready to focus';
        readyLabel.classList.toggle('on-break', pomo.isBreak);
        readyLabel.classList.add('visible');
      }
    } else {
      playBtn.classList.remove('phase-ready');
      if (readyLabel) { readyLabel.classList.remove('visible', 'on-break'); readyLabel.textContent = ''; }
    }
  }

  // Sync full-page overlay
  const fpOverlay = document.getElementById('pomo-fullpage');
  if (fpOverlay) {
    const fpDisplay = document.getElementById('pomo-fp-display');
    const fpProgress = document.getElementById('pomo-fp-progress');
    const fpLabel = document.getElementById('pomo-fp-label');
    const fpPlay = document.getElementById('pomo-fp-play');
    const fpPause = document.getElementById('pomo-fp-pause');
    const fpDots = document.getElementById('pomo-fp-dots');
    const fpReady = document.getElementById('pomo-fp-phase-ready');

    if (fpDisplay) fpDisplay.innerHTML = `${minStr}<span class="pomo-time-unit">m</span>`;
    if (fpProgress) {
      fpProgress.style.strokeDasharray = CIRCUMFERENCE;
      fpProgress.style.strokeDashoffset = CIRCUMFERENCE * (1 - fraction);
      fpProgress.classList.toggle('on-break', pomo.isBreak);
    }
    if (fpLabel) fpLabel.textContent = pomo.isBreak ? (pomo.isLongBreak ? 'Long Break' : 'Break') : 'Focus';
    if (fpPlay) { fpPlay.classList.toggle('on-break', pomo.isBreak); }
    if (fpPause) { fpPause.classList.toggle('on-break', pomo.isBreak); }
    if (fpDots) {
      const total = pomo.sessionsBeforeLong;
      const done = pomo.completedSessions % pomo.sessionsBeforeLong;
      const breakClass = pomo.isBreak ? ' on-break' : '';
      fpDots.innerHTML = Array.from({length: total}, (_, i) =>
        `<span class="pomo-dot${i < done ? ' done' + breakClass : ''}"></span>`
      ).join('');
    }
    if (pomo.isRunning) {
      if (fpPlay) fpPlay.style.display = 'none';
      if (fpPause) fpPause.style.display = 'flex';
      if (fpPlay) fpPlay.classList.remove('phase-ready');
      if (fpReady) { fpReady.classList.remove('visible', 'on-break'); fpReady.textContent = ''; }
    } else {
      if (fpPlay) fpPlay.style.display = 'flex';
      if (fpPause) fpPause.style.display = 'none';
      if (pomo.phaseJustCompleted) {
        if (fpPlay) fpPlay.classList.add('phase-ready');
        if (fpReady) {
          fpReady.textContent = pomo.isBreak ? 'Ready to break' : 'Ready to focus';
          fpReady.classList.toggle('on-break', pomo.isBreak);
          fpReady.classList.add('visible');
        }
      } else {
        if (fpPlay) fpPlay.classList.remove('phase-ready');
        if (fpReady) { fpReady.classList.remove('visible', 'on-break'); fpReady.textContent = ''; }
      }
    }
  }
}

function onSegmentComplete() {
  pomo.isRunning = false;
  releaseWakeLock();
  // Don't stop timer audio here — the embedded chime is playing right now.
  // It will auto-cleanup via its 'ended' event when the chime finishes.
  const wasBreak = pomo.isBreak; // capture before phase flip

  // Notification — requireInteraction keeps it visible on Android lock screen
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification(wasBreak ? 'Break over — time to focus!' : 'Session complete — take a break!', {
      icon: 'icon-192.png',
      badge: 'favicon-96x96.png',
      tag: 'ataraxia-pomo',
      requireInteraction: true,
      silent: false
    });
  }

  // Haptic feedback — works even when AudioContext is suspended on mobile
  if (navigator.vibrate) navigator.vibrate(wasBreak ? [150, 80, 150] : [200, 100, 200, 100, 400]);

  // Bell chime — async so AudioContext.resume() is properly awaited on mobile
  playCompletionChime(wasBreak);

  if (!pomo.isBreak) {
    pomo.completedSessions++;
    const isLong = pomo.completedSessions % pomo.sessionsBeforeLong === 0;
    pomo.isBreak = true;
    pomo.isLongBreak = isLong;
    pomo.totalSeconds = (isLong ? pomo.longBreakMin : pomo.breakMin) * 60;
    pomo.phaseDuration = pomo.totalSeconds;
    showToast(isLong ? `${pomo.completedSessions} sessions done — long break!` : 'Session done — short break');
  } else {
    pomo.isBreak = false;
    pomo.isLongBreak = false;
    pomo.totalSeconds = pomo.workMin * 60;
    pomo.phaseDuration = pomo.totalSeconds;
    showToast('Break over — let\'s focus');
  }

  pomo.pausedRemaining = pomo.totalSeconds;
  pomo.startedAt = null;
  pomo.phaseJustCompleted = true;
  savePomoState();
}

function startPomo() {
  const remaining = pomo.pausedRemaining != null ? pomo.pausedRemaining : pomo.totalSeconds;
  pomo.startedAt = Date.now();
  pomo.totalSeconds = remaining; // recalculate from where we left off
  pomo.pausedRemaining = null;
  pomo.isRunning = true;
  pomo.phaseJustCompleted = false;
  savePomoState();
  initAudioCtx(); // ensure AudioContext is live after user gesture
  startTimerAudio(remaining); // iOS: keepalive audio; all: media session
  requestWakeLock(); // keep screen on so audio fires reliably

  // Request notification permission
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function stopPomo() {
  pomo.isRunning = false;
  pomo.startedAt = null;
  // Reset to the beginning of the current phase
  const full = pomo.phaseDuration || (pomo.isBreak ? pomo.breakMin * 60 : pomo.workMin * 60);
  pomo.pausedRemaining = full;
  pomo.totalSeconds = full;
  releaseWakeLock();
  stopTimerAudio();
  savePomoState();
}

function resetPomo() {
  pomo.isRunning = false;
  pomo.startedAt = null;
  pomo.isBreak = false;
  pomo.isLongBreak = false;
  pomo.totalSeconds = pomo.workMin * 60;
  pomo.phaseDuration = pomo.totalSeconds;
  pomo.pausedRemaining = pomo.totalSeconds;
  pomo.phaseJustCompleted = false;
  releaseWakeLock();
  stopTimerAudio();
  savePomoState();
}

function jumpToPhase(phase) {
  pomo.isRunning = false;
  pomo.startedAt = null;
  pomo.phaseJustCompleted = false;
  if (phase === 'focus') {
    pomo.isBreak = false;
    pomo.isLongBreak = false;
    pomo.totalSeconds = pomo.workMin * 60;
  } else if (phase === 'break') {
    pomo.isBreak = true;
    pomo.isLongBreak = false;
    pomo.totalSeconds = pomo.breakMin * 60;
  } else {
    pomo.isBreak = true;
    pomo.isLongBreak = true;
    pomo.totalSeconds = pomo.longBreakMin * 60;
  }
  pomo.phaseDuration = pomo.totalSeconds;
  pomo.pausedRemaining = pomo.totalSeconds;
  savePomoState();
  // Close settings panels
  document.getElementById('pomo-settings-panel').classList.remove('open');
  document.getElementById('pomo-fp-settings-panel').classList.remove('open');
}

  pomo.sessionsBeforeLong = Math.max(1, Math.min(12, s));

  if (!pomo.isRunning && !pomo.isBreak) {
    pomo.totalSeconds = pomo.workMin * 60;
    pomo.phaseDuration = pomo.totalSeconds;
    pomo.pausedRemaining = pomo.totalSeconds;
  }
  savePomoState();
}

/* ═══════════════════════════════════════
   INIT & EVENT LISTENERS
   ═══════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('version-badge').textContent = VERSION;

  // Random start
  currentBgIdx = Math.floor(Math.random() * BACKGROUNDS.length);
  loadBackground(currentBgIdx);

  currentQuoteIdx = Math.floor(Math.random() * QUOTES.length);
  document.getElementById('quote-text').textContent = QUOTES[currentQuoteIdx].text;
  document.getElementById('quote-author').textContent = QUOTES[currentQuoteIdx].author;

  // Remove pomo-container animation after it ends so it doesn't create a
  // containing block that breaks position:fixed on minimized children.
  const pomoContainer = document.querySelector('.pomo-container');
  if (pomoContainer) {
    pomoContainer.addEventListener('animationend', () => {
      pomoContainer.classList.add('anim-done');
    }, { once: true });
  }

  // Quote buttons
  document.getElementById('btn-new').addEventListener('click', showRandomQuote);
  document.getElementById('btn-bg').addEventListener('click', nextBackground);

  // Collapsible quote card
  const quoteCard = document.getElementById('quote-card');
  const quoteMinBtn = document.getElementById('quote-minimize-btn');
  window.updateQuoteOffset = function() {
    requestAnimationFrame(() => {
      if (quoteCard.classList.contains('minimized')) {
        document.documentElement.style.setProperty('--quote-offset', (quoteCard.offsetWidth + 12) + 'px');
      } else {
        document.documentElement.style.setProperty('--quote-offset', '0px');
      }
    });
  };
  if (localStorage.getItem('ataraxia_quote_minimized') === 'true') {
    quoteCard.classList.add('minimized');
    updateQuoteOffset();
  }
  quoteMinBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    quoteCard.classList.toggle('minimized');
    const isMin = quoteCard.classList.contains('minimized');
    quoteMinBtn.setAttribute('aria-label', isMin ? 'Expand quote' : 'Minimize quote');
    localStorage.setItem('ataraxia_quote_minimized', isMin);
    updateQuoteOffset();
  });
  quoteCard.addEventListener('click', (e) => {
    if (quoteCard.classList.contains('minimized')) {
      quoteCard.classList.remove('minimized');
      quoteMinBtn.setAttribute('aria-label', 'Minimize quote');
      localStorage.setItem('ataraxia_quote_minimized', 'false');
      updateQuoteOffset();
    }
  });

  // Keep --quote-offset in sync whenever the quote pill resizes (font load, language change, etc.)
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(() => updateQuoteOffset()).observe(quoteCard);
  }

  // Minimizable pomodoro widget
  const pomoWidget = document.getElementById('pomo-widget');
  const pomoMinBtn = document.getElementById('pomo-minimize-btn');
  const pomoMiniTime = document.getElementById('pomo-mini-time');
  const pomoMiniDot = document.getElementById('pomo-mini-dot');
  window.updatePomoOffset = function() {
    requestAnimationFrame(() => {
      if (pomoWidget.classList.contains('minimized')) {
        const w = pomoWidget.offsetWidth;
        const h = pomoWidget.offsetHeight;
        document.documentElement.style.setProperty('--pomo-offset', (w + 12) + 'px');
        document.documentElement.style.setProperty('--pomo-height-offset', (h + 12) + 'px');
      } else {
        document.documentElement.style.setProperty('--pomo-offset', '0px');
        document.documentElement.style.setProperty('--pomo-height-offset', '0px');
      }
      if (typeof updateQuoteOffset === 'function') updateQuoteOffset();
    });
  };
  if (localStorage.getItem('ataraxia_pomo_minimized') === 'true') {
    pomoWidget.classList.add('minimized');
    updatePomoOffset();
  }
  pomoMinBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    pomoWidget.classList.add('minimized');
    localStorage.setItem('ataraxia_pomo_minimized', 'true');
    updatePomoOffset();
  });
  pomoWidget.addEventListener('click', (e) => {
    if (pomoWidget.classList.contains('minimized')) {
      pomoWidget.classList.remove('minimized');
      localStorage.setItem('ataraxia_pomo_minimized', 'false');
      updatePomoOffset();
    }
  });

  // Pomodoro buttons
  document.getElementById('pomo-play').addEventListener('click', () => { initAudioCtx(); startPomo(); });
  document.getElementById('pomo-pause').addEventListener('click', stopPomo);
  document.getElementById('pomo-reset').addEventListener('click', resetPomo);

  // Settings toggle
  const settingsPanel = document.getElementById('pomo-settings-panel');
  document.getElementById('pomo-settings-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    settingsPanel.classList.toggle('open');
    if (settingsPanel.classList.contains('open')) loadSettingsUI();
  });

  // Close settings on outside click
  document.addEventListener('click', (e) => {
    if (!settingsPanel.contains(e.target) && e.target.id !== 'pomo-settings-btn') {
      settingsPanel.classList.remove('open');
    }
  });

  // Settings inputs — apply on change
  ['setting-work', 'setting-break', 'setting-long', 'setting-sessions'].forEach(id => {
    document.getElementById(id).addEventListener('change', applySettings);
  });

  // Phase jump chips
  document.getElementById('chip-focus').addEventListener('click', () => jumpToPhase('focus'));
  document.getElementById('chip-break').addEventListener('click', () => jumpToPhase('break'));
  document.getElementById('chip-long').addEventListener('click', () => jumpToPhase('long'));

  // Pomo tick — uses requestAnimationFrame for smooth updates,
  // but the actual timing is timestamp-based (persistent)
  function tick() {
    try { PomoUI(); } catch(e) {}
    requestAnimationFrame(tick);
  }
  tick();

  // Background timer check — ensures completion fires on iOS/iPad when tab is throttled
  setInterval(() => {
    if (pomo.isRunning) {
      // Update lock-screen / control center metadata
      _updateMediaSession();
      if (getRemaining() <= 0) {
        // Resume AudioContext and wait for it before firing completion so
        // playCompletionChime() finds the context already running on Android
        const doComplete = () => onSegmentComplete();
        if (_audioCtx && _audioCtx.state === 'suspended') {
          _audioCtx.resume().then(doComplete).catch(doComplete);
        } else {
          doComplete();
        }
      }
    }
  }, 1000);

  // Also update on visibility change (when user returns to tab)
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) {
      // Resume AudioContext — iOS suspends it when tab is hidden
      if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume();
      PomoUI();
      // Re-request wake lock — it's auto-released when the page is hidden
      if (pomo.isRunning) requestWakeLock();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === 'q' || e.key === 'Q') showRandomQuote();
    if (e.key === 'b' || e.key === 'B') nextBackground();
    if (e.key === ' ') {
      e.preventDefault();
      pomo.isRunning ? stopPomo() : startPomo();
    }
  });

  // ═══════════════════════════════════════
  // FULL-PAGE POMODORO
  // ═══════════════════════════════════════
  const fpOverlay = document.getElementById('pomo-fullpage');
  const pomoRingWrapper = document.querySelector('.pomo-widget .pomo-ring-wrapper');

  // Open full-page on ring click
  pomoRingWrapper.addEventListener('click', (e) => {
    e.stopPropagation();
    fpOverlay.classList.add('open');
  });

  document.getElementById('pomo-fullscreen-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    fpOverlay.classList.add('open');
  });

  // Close full-page
  document.getElementById('pomo-fullpage-close').addEventListener('click', () => {
    fpOverlay.classList.remove('open');
    document.getElementById('pomo-fp-settings-panel').classList.remove('open');
  });

  // Also close on click outside the ring area in full-page
  fpOverlay.addEventListener('click', (e) => {
    if (e.target === fpOverlay) {
      fpOverlay.classList.remove('open');
      document.getElementById('pomo-fp-settings-panel').classList.remove('open');
    }
  });

  // Full-page controls
  document.getElementById('pomo-fp-play').addEventListener('click', () => { initAudioCtx(); startPomo(); });
  document.getElementById('pomo-fp-pause').addEventListener('click', stopPomo);
  document.getElementById('pomo-fp-reset').addEventListener('click', resetPomo);
  const fpSettingsPanel = document.getElementById('pomo-fp-settings-panel');
  document.getElementById('pomo-fp-settings-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    fpSettingsPanel.classList.toggle('open');
    if (fpSettingsPanel.classList.contains('open')) loadFpSettingsUI();
  });

  // Fullpage settings inputs — apply on change
  ['fp-setting-work', 'fp-setting-break', 'fp-setting-long', 'fp-setting-sessions'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFpSettings);
  });

  // Fullpage phase jump chips
  document.getElementById('fp-chip-focus').addEventListener('click', () => jumpToPhase('focus'));
  document.getElementById('fp-chip-break').addEventListener('click', () => jumpToPhase('break'));
  document.getElementById('fp-chip-long').addEventListener('click', () => jumpToPhase('long'));

  // Close fp settings via close button (phone layout)
  document.getElementById('pomo-fp-settings-close').addEventListener('click', (e) => {
    e.stopPropagation();
    fpSettingsPanel.classList.remove('open');
  });

  // Close fp settings on outside click within overlay
  fpOverlay.addEventListener('click', (e) => {
    if (!fpSettingsPanel.contains(e.target) && e.target.id !== 'pomo-fp-settings-btn') {
      fpSettingsPanel.classList.remove('open');
    }
  });

  // Escape key closes full-page or fp settings
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && fpOverlay.classList.contains('open')) {
      if (fpSettingsPanel.classList.contains('open')) {
        fpSettingsPanel.classList.remove('open');
      } else {
        fpOverlay.classList.remove('open');
      }
    }
  });

  // ═══════════════════════════════════════
  // INIT AUTO-TRANSLATE
  // ═══════════════════════════════════════
  initTranslation();
});

const TRANSLATION_CACHE_KEY = 'stoicflow_translations';
const LANG_PREF_KEY = 'stoicflow_lang';

let currentLang = 'en';
let translationCache = {};

function loadTranslationCache() {
  try {
    const raw = localStorage.getItem(TRANSLATION_CACHE_KEY);
    if (raw) translationCache = JSON.parse(raw);
  } catch(e) { translationCache = {}; }
}

function saveTranslationCache() {
  try {
    localStorage.setItem(TRANSLATION_CACHE_KEY, JSON.stringify(translationCache));
  } catch(e) {}
}

function getCacheKey(text, targetLang) {
  return `en|${targetLang}|${text}`;
}

function getCachedTranslation(text, targetLang) {
  return translationCache[getCacheKey(text, targetLang)] || null;
}

function setCachedTranslation(text, targetLang, translated) {
  translationCache[getCacheKey(text, targetLang)] = translated;
}

/**
 * Translate text using open-source APIs.
 * Provider 1: MyMemory (free, no API key, 1000 words/day anonymous)
 * Provider 2: LibreTranslate public instance (FOSS)
 */
async function translateText(text, targetLang) {
  if (targetLang === 'en') return text;
  if (!text || !text.trim()) return text;

  // Check cache first
  const cached = getCachedTranslation(text, targetLang);
  if (cached) return cached;

  // Try MyMemory first (most reliable free API)
  try {
    const encoded = encodeURIComponent(text);
    const url = `https://api.mymemory.translated.net/get?q=${encoded}&langpair=en|${targetLang}`;
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
        const translated = data.responseData.translatedText;
        // MyMemory returns uppercase when it can't translate — skip those
        if (translated !== text.toUpperCase()) {
          setCachedTranslation(text, targetLang, translated);
          return translated;
        }
      }
    }
  } catch(e) { /* fall through to next provider */ }

  // Fallback: LibreTranslate public instance
  try {
    const resp = await fetch('https://libretranslate.com/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ q: text, source: 'en', target: targetLang, format: 'text' }),
    });
    if (resp.ok) {
      const data = await resp.json();
      if (data.translatedText) {
        setCachedTranslation(text, targetLang, data.translatedText);
        return data.translatedText;
      }
    }
  } catch(e) { /* translation unavailable */ }

  // Return original if all providers fail
  return text;
}

/**
 * Batch translate an array of strings. Returns array of translated strings.
 * Uses concurrency limit to avoid hammering the API.
 */
async function batchTranslate(texts, targetLang) {
  if (targetLang === 'en') return [...texts];

  const results = new Array(texts.length);
  const uncached = [];

  // Separate cached from uncached
  for (let i = 0; i < texts.length; i++) {
    const cached = getCachedTranslation(texts[i], targetLang);
    if (cached) {
      results[i] = cached;
    } else {
      uncached.push(i);
    }
  }

  // Translate uncached items with concurrency limit of 3
  const CONCURRENCY = 3;
  for (let start = 0; start < uncached.length; start += CONCURRENCY) {
    const batch = uncached.slice(start, start + CONCURRENCY);
    const promises = batch.map(idx => translateText(texts[idx], targetLang).then(t => { results[idx] = t; }));
    await Promise.all(promises);
  }

  saveTranslationCache();
  return results;
}

async function translateCurrentQuote() {
  if (currentLang === 'en') return;

  const textEl = document.getElementById('quote-text');
  const authorEl = document.getElementById('quote-author');
  const quote = QUOTES[currentQuoteIdx];
  if (!quote) return;

  // Fade out immediately — don't show original while waiting for translation
  textEl.style.opacity = '0';

  const [translatedText] = await batchTranslate([quote.text], currentLang);
  // Only update if still showing the same quote
  if (currentQuoteIdx === QUOTES.indexOf(quote)) {
    textEl.textContent = translatedText;
  }
  // Double rAF ensures browser renders opacity:0 before starting fade-in transition
  requestAnimationFrame(() => requestAnimationFrame(() => {
    textEl.style.opacity = '1';
  }));
}

async function translateUIStrings(lang) {
  if (lang === 'en') {
    applyUIStrings(UI_STRINGS.en);
    return;
  }

  // Check if we already have cached UI strings for this language
  if (UI_STRINGS[lang]) {
    applyUIStrings(UI_STRINGS[lang]);
    return;
  }

  // Translate UI strings
  const keys = Object.keys(UI_STRINGS.en);
  const values = keys.map(k => UI_STRINGS.en[k]);
  const translated = await batchTranslate(values, lang);

  const langStrings = {};
  keys.forEach((k, i) => { langStrings[k] = translated[i]; });
  UI_STRINGS[lang] = langStrings;

  applyUIStrings(langStrings);
}

function applyUIStrings(strings) {
  document.getElementById('btn-new').textContent = strings.newQuote;
  document.getElementById('btn-bg').textContent = strings.newScene;
  document.getElementById('coffee-btn-label').textContent = strings.coffeeBtn || 'Buy me a coffee';

  // Settings panel text (normal widget)
  const settingsPanel = document.getElementById('pomo-settings-panel');
  const h4s = settingsPanel.querySelectorAll('h4');
  if (h4s[0]) h4s[0].textContent = strings.timerSettings;
  if (h4s[1]) h4s[1].textContent = strings.jumpToPhase;

  const labels = settingsPanel.querySelectorAll('.setting-row label');
  if (labels[0]) labels[0].textContent = strings.focusMin;
  if (labels[1]) labels[1].textContent = strings.breakMin;
  if (labels[2]) labels[2].textContent = strings.longBreak;
  if (labels[3]) labels[3].textContent = strings.sessions;

  document.getElementById('chip-focus').textContent = strings.focus;
  document.getElementById('chip-break').textContent = strings.break;
  document.getElementById('chip-long').textContent = strings.longBreakLabel;

  // Fullscreen settings panel
  const fpPanel = document.getElementById('pomo-fp-settings-panel');
  const fpH4s = fpPanel.querySelectorAll('h4');
  if (fpH4s[0]) fpH4s[0].textContent = strings.timerSettings;
  if (fpH4s[1]) fpH4s[1].textContent = strings.jumpToPhase;

  const fpLabels = fpPanel.querySelectorAll('.setting-row label');
  if (fpLabels[0]) fpLabels[0].textContent = strings.focusMin;
  if (fpLabels[1]) fpLabels[1].textContent = strings.breakMin;
  if (fpLabels[2]) fpLabels[2].textContent = strings.longBreak;
  if (fpLabels[3]) fpLabels[3].textContent = strings.sessions;

  document.getElementById('fp-chip-focus').textContent = strings.focus;
  document.getElementById('fp-chip-break').textContent = strings.break;
  document.getElementById('fp-chip-long').textContent = strings.longBreakLabel;

  // Minimized quote label
  const qml = document.getElementById('quote-mini-label');
  if (qml) qml.textContent = strings.quote;

  // Fullscreen radial input labels
  const fpRadialLabels = fpPanel.querySelectorAll(':scope > .radial-item:not(.radial-chip) label');
  if (fpRadialLabels[0]) fpRadialLabels[0].textContent = strings.focus;
  if (fpRadialLabels[1]) fpRadialLabels[1].textContent = strings.break;
  if (fpRadialLabels[2]) fpRadialLabels[2].textContent = strings.longBreak;
  if (fpRadialLabels[3]) fpRadialLabels[3].textContent = strings.sessions;

  // Recalculate pomo offset if minimized (text width may have changed)
  const pw = document.getElementById('pomo-widget');
  if (pw && pw.classList.contains('minimized') && typeof window.updatePomoOffset === 'function') {
    window.updatePomoOffset();
  }
}

// Override showToast and pomo label updates to use translated strings
const _origUpdatePomoUI = PomoUI;

function getTranslatedPomoStrings() {
  return UI_STRINGS[currentLang] || UI_STRINGS.en;
}

// Patch PomoUI to use translated labels
const _origLabel = null;
(function patchPomoUI() {
  const origFn = PomoUI;
  window.PomoUI = function() {
    origFn();
    const s = getTranslatedPomoStrings();
    const label = document.getElementById('pomo-label');
    const breakLabel = pomo.isLongBreak ? (s.longBreakLabel || s.break) : s.break;
    label.textContent = pomo.isBreak ? breakLabel : s.focus;

    const readyLabel = document.getElementById('pomo-phase-ready');
    if (pomo.phaseJustCompleted && !pomo.isRunning && readyLabel) {
      readyLabel.textContent = pomo.isBreak ? s.readyBreak : s.readyFocus;
    }

    // Translate fullpage overlay labels
    const fpLabel = document.getElementById('pomo-fp-label');
    if (fpLabel) fpLabel.textContent = pomo.isBreak ? breakLabel : s.focus;
    const fpReady = document.getElementById('pomo-fp-phase-ready');
    if (pomo.phaseJustCompleted && !pomo.isRunning && fpReady) {
      fpReady.textContent = pomo.isBreak ? s.readyBreak : s.readyFocus;
    }

    // Translate tab title — preserve emoji prefix and structure
    const stageEmoji = pomo.isBreak ? (pomo.isLongBreak ? '🌿' : '☕') : '🎯';
    const translatedStage = pomo.isBreak ? breakLabel : s.focus;
    const pausedMark = !pomo.isRunning && (pomo.pausedRemaining != null || pomo.startedAt != null) ? '⏸ ' : '';
    const minStr = formatMinutes(getRemaining());
    document.title = `${pausedMark}${stageEmoji} ${translatedStage} · ${minStr}m · Ataraxia`;
  };
  // Reassign for the tick loop
  PomoUI = window.PomoUI;
})();

// Patch onSegmentComplete for translated toasts
const _origOnSegmentComplete = onSegmentComplete;
window.onSegmentComplete = function() {
  _origOnSegmentComplete();
  // Re-show toast in the current language (original shows English)
  const s = getTranslatedPomoStrings();
  if (pomo.isBreak) {
    // Just flipped from focus → break
    const msg = pomo.isLongBreak
      ? `${pomo.completedSessions} ${s.longBreakMsg}`
      : s.sessionDone;
    showToast(msg);
  } else {
    // Just flipped from break → focus
    showToast(s.breakOver);
  }
};
onSegmentComplete = window.onSegmentComplete;

// Patch showRandomQuote to translate after showing
const _origShowRandomQuote = showRandomQuote;
window.showRandomQuote = function() {
  _origShowRandomQuote();
  if (currentLang !== 'en') {
    // Translate after the fade-in delay
    setTimeout(() => translateCurrentQuote(), 450);
  }
};
showRandomQuote = window.showRandomQuote;

function setLanguageStatus(msg) {
  const el = document.getElementById('lang-status');
  if (msg) {
    el.textContent = msg;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

async function switchLanguage(langCode) {
  currentLang = langCode;
  localStorage.setItem(LANG_PREF_KEY, langCode);

  const langData = SUPPORTED_LANGS.find(l => l.code === langCode);
  document.getElementById('lang-label').textContent = langData ? langData.native : langCode;
  document.documentElement.lang = langCode;

  // Update active state in dropdown
  document.querySelectorAll('.lang-option').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === langCode);
  });

  // Close dropdown
  document.getElementById('lang-dropdown').classList.remove('open');

  if (langCode === 'en') {
    // Restore original English text
    const quote = QUOTES[currentQuoteIdx];
    document.getElementById('quote-text').textContent = quote.text;
    document.getElementById('quote-author').textContent = quote.author;
    applyUIStrings(UI_STRINGS.en);
    setLanguageStatus('');
    return;
  }

  setLanguageStatus('Translating…');

  try {
    await Promise.all([
      translateCurrentQuote(),
      translateUIStrings(langCode),
    ]);
  } catch(e) {
    // Silently continue — partial translation is fine
  }

  setLanguageStatus('');
}

function buildLangDropdown() {
  const dropdown = document.getElementById('lang-dropdown');
  dropdown.innerHTML = SUPPORTED_LANGS.map(lang =>
    `<button class="lang-option${lang.code === currentLang ? ' active' : ''}" data-lang="${lang.code}">${lang.native}</button>`
  ).join('');

  dropdown.addEventListener('click', (e) => {
    const btn = e.target.closest('.lang-option');
    if (btn) switchLanguage(btn.dataset.lang);
  });
}

function initTranslation() {
  loadTranslationCache();
  buildLangDropdown();

  // Toggle dropdown
  const langBtn = document.getElementById('lang-btn');
  const dropdown = document.getElementById('lang-dropdown');
  langBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', (e) => {
    if (!dropdown.contains(e.target) && e.target !== langBtn) {
      dropdown.classList.remove('open');
    }
  });

  // Check saved preference or detect browser language
  const saved = localStorage.getItem(LANG_PREF_KEY);
  if (saved && saved !== 'en') {
    switchLanguage(saved);
  } else if (!saved) {
    // Auto-detect from browser
    const browserLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0].toLowerCase();
    if (browserLang !== 'en' && SUPPORTED_LANGS.find(l => l.code === browserLang)) {
      switchLanguage(browserLang);
    }
  }
}
