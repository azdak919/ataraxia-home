<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Outfit:wght@200;300;400;500&family=Raleway:wght@200;300;400&display=swap" rel="stylesheet">

<style>
  /* ═══════════════════════════════════════════
     CSS CUSTOM PROPERTIES — OS ADAPTIVE THEME
     ═══════════════════════════════════════════ */
  :root {
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'Outfit', system-ui, sans-serif;

    /* Light theme (default) */
    --bg-primary: #f5f0eb;
    --bg-glass: rgba(255, 255, 255, 0.55);
    --bg-glass-hover: rgba(255, 255, 255, 0.72);
    --border-glass: rgba(180, 170, 155, 0.3);
    --text-primary: #2c2824;
    --text-secondary: #6b6259;
    --text-muted: #9a9088;
    --accent: #8b6f4e;
    --accent-glow: rgba(139, 111, 78, 0.15);
    --shadow-soft: rgba(44, 40, 36, 0.06);
    --shadow-medium: rgba(44, 40, 36, 0.1);
    --overlay: rgba(245, 240, 235, 0.35);
    --pomo-work: #8b6f4e;
    --pomo-break: #5a7f6a;
    --pomo-ring-bg: rgba(139, 111, 78, 0.12);
    --toast-bg: rgba(255,255,255,0.85);
    --settings-bg: rgba(252, 249, 246, 0.96);
    --settings-border: rgba(160, 148, 132, 0.45);
  }

  /* Dark theme — adapts to OS preference */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1816;
      --bg-glass: rgba(40, 36, 32, 0.6);
      --bg-glass-hover: rgba(50, 45, 40, 0.75);
      --border-glass: rgba(100, 90, 78, 0.25);
      --text-primary: #e8e0d8;
      --text-secondary: #a89e94;
      --text-muted: #6b6259;
      --accent: #c9a87c;
      --accent-glow: rgba(201, 168, 124, 0.12);
      --shadow-soft: rgba(0, 0, 0, 0.15);
      --shadow-medium: rgba(0, 0, 0, 0.3);
      --overlay: rgba(26, 24, 22, 0.45);
      --pomo-work: #c9a87c;
      --pomo-break: #7aab8e;
      --pomo-ring-bg: rgba(201, 168, 124, 0.1);
      --toast-bg: rgba(40,36,32,0.9);
      --settings-bg: rgba(30, 27, 24, 0.97);
      --settings-border: rgba(100, 88, 72, 0.55);
    }
  }

  /* High contrast mode */
  @media (prefers-contrast: high) {
    :root {
      --bg-glass: rgba(255, 255, 255, 0.85);
      --border-glass: rgba(0, 0, 0, 0.4);
      --text-primary: #000;
      --text-secondary: #333;
    }
  }
  @media (prefers-contrast: high) and (prefers-color-scheme: dark) {
    :root {
      --bg-glass: rgba(0, 0, 0, 0.85);
      --border-glass: rgba(255, 255, 255, 0.4);
      --text-primary: #fff;
      --text-secondary: #ccc;
    }
  }

  /* ═══════════════════════
     LANGUAGE SELECTOR
     ═══════════════════════ */
  /* ═══════════════════════
     TOP-RIGHT ACTIONS
     ═══════════════════════ */
  .top-right-actions {
    position: fixed;
    top: 0;
    right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: max(1.25rem, env(safe-area-inset-top, 0px)) max(1.25rem, env(safe-area-inset-right, 0px)) 0 max(1.25rem, env(safe-area-inset-left, 0px));
    animation: uiEnter 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.9s both;
  }

  .coffee-btn {
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    line-height: 1.2;
    box-sizing: border-box;
    color: var(--text-secondary);
    background: var(--bg-glass);
    border: 1px solid var(--border-glass);
    border-radius: 10px;
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    text-decoration: none;
    white-space: nowrap;
  }
  .coffee-btn:hover {
    background: var(--bg-glass-hover);
    border-color: var(--accent);
    color: var(--text-primary);
  }
  .coffee-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    opacity: 0.7;
    flex-shrink: 0;
  }

  .lang-selector {
    position: relative;
  }
  .lang-btn {
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.03em;
    line-height: 1.2;
    box-sizing: border-box;
    color: var(--text-secondary);
    background: var(--bg-glass);
    border: 1px solid var(--border-glass);
    border-radius: 10px;
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .lang-btn:hover { background: var(--bg-glass-hover); border-color: var(--accent); }
  .lang-btn svg { width: 14px; height: 14px; fill: currentColor; opacity: 0.7; }
  .lang-dropdown {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--settings-bg);
    border: 1px solid var(--settings-border);
    border-radius: 12px;
    padding: 0.35rem;
    min-width: 150px;
    max-height: 280px;
    overflow-y: auto;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px var(--shadow-medium);
    display: none;
  }
  .lang-dropdown.open { display: block; animation: fadeSlideIn 0.25s ease; }
  .lang-option {
    display: block;
    width: 100%;
    text-align: left;
    font-family: var(--font-body);
    font-size: 0.78rem;
    color: var(--text-primary);
    background: none;
    border: none;
    border-radius: 8px;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    transition: background 0.15s;
  }
  .lang-option:hover { background: var(--accent-glow); }
  .lang-option.active { color: var(--accent); font-weight: 500; }
  .lang-translating {
    position: absolute;
    top: calc(100% + 4px);
    right: 0;
    font-size: 0.65rem;
    color: var(--text-muted);
    text-align: right;
    padding: 0.2rem 0;
    opacity: 0;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .lang-translating.visible { opacity: 1; }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ═══════════════════════
     RESET & BASE
     ═══════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* Prevent sticky tap highlight on mobile */
  button, .btn, .phase-chip {
    -webkit-tap-highlight-color: transparent;
  }

  html {
    font-size: 16px;
    scroll-behavior: smooth;
    color-scheme: light dark;
  }

  body {
    font-family: var(--font-body);
    color: var(--text-primary);
    background: var(--bg-primary);
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════════════════════
     BACKGROUND IMAGE
     ═══════════════════════ */
  #bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: opacity 1.8s ease 0.3s;
    opacity: 0;
  }
  #bg-layer.loaded { opacity: 1; }

  #bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    background: var(--overlay);
  }

  /* ═══════════════════════
     PAGE LAYOUT — flex-column, fixed top/bottom overlays
     ═══════════════════════ */
  .page-layout {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ═══════════════════════
     MAIN CONTENT
     ═══════════════════════ */
  .content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: min(760px, calc(100vw - 3rem));
    padding: 2rem;
    padding-bottom: 3rem;
    margin: 0 auto;
    overflow: hidden;
    position: relative;
    gap: 1.5rem;
  }

  /* ═══════════════════════
     QUOTE CARD
     ═══════════════════════ */
  .quote-card {
    position: relative;
    flex-shrink: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--border-glass);
    border-radius: 20px;
    padding: 3rem 2.75rem;
    text-align: center;
    box-shadow:
      0 8px 32px var(--shadow-soft),
      0 2px 8px var(--shadow-soft);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.4s ease,
                padding 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                border-radius 0.4s ease;
    animation: cardEnter 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.7s both;
  }

  .quote-card.minimized {
    position: fixed;
    bottom: 1.5rem;
    left: 1.5rem;
    top: auto;
    transform: none;
    width: auto;
    padding: 0.6rem;
    border-radius: 28px;
    cursor: pointer;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .quote-card.minimized:hover {
    transform: translateY(-1px);
  }

  .quote-card .quote-inner {
    transition: opacity 0.35s ease, max-height 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    overflow-y: auto;
    flex-shrink: 1;
    min-height: 0;
  }

  .quote-card.minimized .quote-inner {
    display: none;
    pointer-events: none;
  }

  .quote-minimize-btn {
    position: absolute;
    top: 0.75rem;
    right: 0.75rem;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border-glass);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    z-index: 2;
  }

  .quote-minimize-btn:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
  }
  .quote-minimize-btn:active { background: var(--bg-glass-hover); transform: scale(0.9); }

  .quote-minimize-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    transition: transform 0.3s ease;
  }

  .quote-card.minimized .quote-minimize-btn {
    display: none;
  }

  .quote-mini-indicator {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
  }

  .quote-card.minimized .quote-mini-indicator {
    display: flex;
  }

  .quote-mini-mark {
    font-size: 1.4rem;
    line-height: 1;
    color: var(--text-muted);
    font-family: var(--font-heading);
  }

  .quote-mini-label {
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .quote-card:hover {
    transform: translateY(-2px);
    box-shadow:
      0 12px 40px var(--shadow-medium),
      0 4px 12px var(--shadow-soft);
  }

  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(36px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes uiEnter {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: none; }
  }

  .quote-mark {
    font-family: var(--font-display);
    font-size: 4rem;
    line-height: 1;
    color: var(--accent);
    opacity: 0.35;
    margin-bottom: -1rem;
    user-select: none;
  }

  .quote-text {
    font-family: var(--font-display);
    font-size: 1.65rem;
    font-weight: 400;
    line-height: 1.55;
    color: var(--text-primary);
    margin-bottom: 1.5rem;
    font-style: italic;
    transition: opacity 0.35s ease;
  }

  .quote-author {
    font-family: var(--font-body);
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    transition: opacity 0.35s ease;
  }

  .quote-author::before {
    content: '— ';
    opacity: 0.5;
  }

  .quote-action-row {
    display: flex;
    justify-content: center;
    gap: 0.75rem;
    margin-top: 1.75rem;
  }

  .btn {
    font-family: var(--font-body);
    font-size: 0.78rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    border-radius: 100px;
    border: 1px solid var(--border-glass);
    background: var(--bg-glass);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .btn:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  .btn:active { transform: scale(0.97); background: var(--bg-glass-hover); }

  /* ═══════════════════════
     POMODORO TIMER
     Zone Productivity Timer style
     ═══════════════════════ */
  .pomo-container {
    position: relative;
    z-index: 100;
    flex-shrink: 0;
    margin-top: 0.5rem;
    animation: pomoEnter 1.1s cubic-bezier(0.22, 1, 0.36, 1) 1.0s both;
  }
  .pomo-container.anim-done {
    animation: none;
  }

  @keyframes pomoEnter {
    from { opacity: 0; transform: translateY(30px) scale(0.92); }
    to   { opacity: 1; transform: none; }
  }

  .pomo-widget {
    position: relative;
    background: var(--bg-glass);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid var(--border-glass);
    border-radius: 28px;
    padding: 1.5rem 1.25rem 1.25rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    width: 210px;
    box-shadow: 0 8px 36px var(--shadow-soft), 0 2px 8px var(--shadow-soft);
    transition: box-shadow 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    cursor: default;
  }

  .pomo-widget:hover {
    box-shadow: 0 14px 44px var(--shadow-medium), 0 2px 8px var(--shadow-soft);
  }

  /* Fullscreen button */
  .pomo-fullscreen-btn {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border-glass);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    z-index: 2;
  }

  .pomo-fullscreen-btn:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
  }
  .pomo-fullscreen-btn:active { background: var(--bg-glass-hover); transform: scale(0.9); }

  .pomo-fullscreen-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
  }

  .pomo-widget.minimized .pomo-fullscreen-btn {
    display: none;
  }

  /* Minimize button */
  .pomo-minimize-btn {
    position: absolute;
    top: 0.5rem;
    right: 0.5rem;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--border-glass);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    z-index: 2;
  }

  .pomo-minimize-btn:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
  }
  .pomo-minimize-btn:active { background: var(--bg-glass-hover); transform: scale(0.9); }

  .pomo-minimize-btn svg {
    width: 14px;
    height: 14px;
    fill: currentColor;
    transition: transform 0.3s ease;
  }

  /* Minimized pomo state */
  .pomo-widget.minimized {
    position: fixed;
    bottom: 1.5rem;
    left: calc(1.5rem + var(--quote-offset, 0px));
    z-index: 200;
    width: auto;
    min-width: 56px;
    padding: 0.6rem;
    border-radius: 28px;
    cursor: pointer;
    gap: 0;
  }

  .pomo-widget.minimized .pomo-ring-wrapper,
  .pomo-widget.minimized .pomo-phase-ready-label,
  .pomo-widget.minimized .pomo-controls,
  .pomo-widget.minimized .pomo-minimize-btn {
    display: none;
  }

  .pomo-mini-indicator {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
  }

  .pomo-widget.minimized .pomo-mini-indicator {
    display: flex;
  }

  .pomo-mini-dot {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--pomo-work);
    transition: background 0.3s ease;
  }

  .pomo-mini-dot.on-break {
    background: var(--pomo-break);
  }

  .pomo-mini-time {
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* Large ring */
  .pomo-ring-wrapper {
    position: relative;
    width: 162px;
    height: 162px;
    flex-shrink: 0;
  }

  .pomo-ring {
    width: 162px;
    height: 162px;
    transform: rotate(-90deg);
  }

  .pomo-ring-bg {
    fill: none;
    stroke: var(--pomo-ring-bg);
    stroke-width: 5.5;
  }

  .pomo-ring-progress {
    fill: none;
    stroke: var(--pomo-work);
    stroke-width: 5.5;
    stroke-linecap: round;
    stroke-dasharray: 326.73;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
  }

  .pomo-ring-progress.on-break {
    stroke: var(--pomo-break);
  }

  /* Center content inside ring */
  .pomo-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.1rem;
  }

  .pomo-label {
    font-family: var(--font-body);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    max-width: 82%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .pomo-time-inside {
    font-family: 'Raleway', var(--font-body), system-ui, sans-serif;
    font-size: 2.7rem;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }

  .pomo-time-unit {
    font-family: var(--font-body);
    font-size: 0.9rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-left: 1px;
    vertical-align: middle;
  }

  /* Session progress dots */
  .pomo-dots {
    display: flex;
    gap: 4px;
    margin-top: 0.3rem;
  }

  .pomo-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--pomo-ring-bg);
    transition: background 0.3s ease;
  }

  .pomo-dot.done {
    background: var(--pomo-work);
  }

  .pomo-dot.done.on-break {
    background: var(--pomo-break);
  }

  /* Controls row */
  .pomo-controls {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .pomo-btn {
    border-radius: 50%;
    border: 1px solid var(--border-glass);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
    flex-shrink: 0;
  }

  /* Large primary play/pause button */
  .pomo-btn--primary {
    width: 44px;
    height: 44px;
    background: var(--pomo-work);
    border-color: transparent;
    color: #fff;
    box-shadow: 0 4px 14px var(--accent-glow);
  }

  .pomo-btn--primary.on-break {
    background: var(--pomo-break);
    box-shadow: 0 4px 14px rgba(90, 127, 106, 0.25);
  }

  .pomo-btn--primary:hover {
    opacity: 0.88;
    transform: scale(1.06);
  }
  .pomo-btn--primary:active { opacity: 0.75; transform: scale(0.95); }

  /* Phase-complete ready-to-start state */
  .pomo-btn--primary.phase-ready {
    animation: pulseReady 1.6s ease-in-out infinite;
  }

  @keyframes pulseReady {
    0%, 100% { box-shadow: 0 4px 14px var(--accent-glow), 0 0 0 0 var(--accent-glow); }
    50%       { box-shadow: 0 4px 18px var(--accent-glow), 0 0 0 7px transparent; }
  }

  .pomo-phase-ready-label {
    font-family: var(--font-body);
    font-size: 0.54rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--pomo-work);
    text-align: center;
    margin-top: -0.25rem;
    opacity: 0;
    max-height: 0;
    transition: opacity 0.4s ease, max-height 0.4s ease;
    overflow: hidden;
    word-wrap: break-word;
    overflow-wrap: break-word;
    width: 100%;
    line-height: 1.3;
  }

  .pomo-phase-ready-label.visible {
    opacity: 1;
    max-height: 2.6em;
  }

  .pomo-phase-ready-label.on-break {
    color: var(--pomo-break);
  }

  /* Small secondary reset/settings buttons */
  .pomo-btn--secondary {
    width: 32px;
    height: 32px;
  }

  .pomo-btn--secondary:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
    border-color: var(--accent);
  }
  .pomo-btn--secondary:active { background: var(--bg-glass-hover); transform: scale(0.93); }

  .pomo-btn svg {
    fill: currentColor;
  }

  .pomo-btn--primary svg {
    width: 18px;
    height: 18px;
  }

  .pomo-btn--secondary svg {
    width: 13px;
    height: 13px;
  }

  /* Settings panel */
  .pomo-settings {
    display: none;
    position: absolute;
    bottom: calc(100% + 0.75rem);
    left: 0;
    background: var(--settings-bg);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid var(--settings-border);
    border-radius: 18px;
    padding: 1.25rem;
    min-width: 210px;
    max-height: calc(100vh - 220px);
    max-height: calc(100dvh - 220px);
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.08);
    animation: settingsIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 500;
  }

  .pomo-settings.open { display: block; }

  @keyframes settingsIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pomo-settings h4, .pomo-fp-settings h4 {
    font-family: var(--font-body);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.85rem;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.65rem;
  }

  .setting-row label {
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--text-secondary);
  }

  .setting-row input[type="number"] {
    width: 52px;
    padding: 0.3rem 0.4rem;
    border-radius: 8px;
    border: 1px solid var(--settings-border);
    background: rgba(0,0,0,0.04);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.8rem;
    text-align: center;
    outline: none;
    transition: border-color 0.25s;
  }
  @media (prefers-color-scheme: dark) {
    .setting-row input[type="number"] { background: rgba(255,255,255,0.06); }
  }

  .setting-row input[type="number"]:focus {
    border-color: var(--accent);
  }

  .setting-divider {
    height: 1px;
    background: var(--settings-border);
    margin: 0.85rem 0 0.75rem;
  }

  .setting-phase-chips {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .phase-chip {
    flex: 1;
    padding: 0.32rem 0.4rem;
    border-radius: 8px;
    border: 1px solid var(--settings-border);
    background: rgba(0,0,0,0.04);
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 0.72rem;
    font-weight: 400;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .phase-chip:hover {
    background: var(--accent);
    color: #fff;
    border-color: transparent;
  }
  .phase-chip:active { transform: scale(0.96); }

  @media (prefers-color-scheme: dark) {
    .phase-chip { background: rgba(255,255,255,0.06); }
    .phase-chip:hover { background: var(--accent); color: #1a1816; }
  }

  /* ═══════════════════════
     IMAGE CREDIT
     ═══════════════════════ */
  /* ═══════════════════════
     BOTTOM-RIGHT CREDITS BAR
     ═══════════════════════ */
  .bottom-badges {
    position: fixed;
    bottom: max(1.25rem, env(safe-area-inset-bottom, 0px));
    right: max(1.25rem, env(safe-area-inset-right, 0px));
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 0;
    opacity: 0;
    transition: opacity 0.6s ease, background 0.3s ease;
    z-index: 1;
    pointer-events: auto;
    font-family: var(--font-body);
    font-size: 0.65rem;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.75);
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
    background: rgba(0, 0, 0, 0.22);
    padding: 0.3rem 0.75rem;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    letter-spacing: 0.02em;
  }
  .bottom-badges.visible {
    opacity: 0.72;
  }
  .bottom-badges:hover {
    opacity: 1;
    background: rgba(0, 0, 0, 0.36);
  }

  .bottom-badges .credits-divider {
    margin: 0 0.5rem;
    opacity: 0.4;
  }

  .img-credit {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 28rem;
    flex-shrink: 1;
    min-width: 0;
  }
  .img-credit a {
    color: rgba(255, 255, 255, 0.9);
    text-decoration: none;
  }
  .img-credit a:hover { text-decoration: underline; }

  .license-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    color: inherit;
    text-decoration: none;
    white-space: nowrap;
    cursor: pointer;
  }
  .license-badge:hover {
    color: rgba(255, 255, 255, 1);
  }

  .version-badge {
    white-space: nowrap;
  }

  .copyleft-symbol {
    font-size: 0.75rem;
    line-height: 1;
    flex-shrink: 0;
    opacity: 0.9;
    display: inline-block;
    transform: scaleX(-1);
  }

  /* ═══════════════════════
     POMODORO FULL-PAGE VIEW
     ═══════════════════════ */
  .pomo-fullpage-overlay {
    display: flex;
    position: fixed;
    inset: 0;
    z-index: 900;
    background: var(--bg-glass);
    backdrop-filter: blur(32px) saturate(1.4);
    -webkit-backdrop-filter: blur(32px) saturate(1.4);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    overflow-y: auto;
    overflow-x: hidden;
    transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1),
                visibility 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .pomo-fullpage-overlay.open {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    position: fixed;
  }

  .pomo-fullpage-overlay .pomo-ring-wrapper {
    width: 280px;
    height: 280px;
  }

  .pomo-fullpage-overlay .pomo-ring {
    width: 280px;
    height: 280px;
  }

  .pomo-fullpage-overlay .pomo-time-inside {
    font-size: 5.5rem;
  }

  .pomo-fullpage-overlay .pomo-label {
    font-size: 0.85rem;
  }

  .pomo-fullpage-overlay .pomo-dots {
    margin-top: 0.5rem;
  }

  .pomo-fullpage-overlay .pomo-dot {
    width: 8px;
    height: 8px;
  }

  .pomo-fullpage-overlay .pomo-time-unit {
    font-size: 1.4rem;
  }

  .pomo-fullpage-overlay .pomo-controls {
    gap: 1rem;
  }

  .pomo-fullpage-overlay .pomo-btn--primary {
    width: 60px;
    height: 60px;
  }

  .pomo-fullpage-overlay .pomo-btn--primary svg {
    width: 26px;
    height: 26px;
  }

  .pomo-fullpage-overlay .pomo-btn--secondary {
    width: 44px;
    height: 44px;
  }

  .pomo-fullpage-overlay .pomo-btn--secondary svg {
    width: 18px;
    height: 18px;
  }

  .pomo-fullpage-overlay .pomo-phase-ready-label {
    font-size: 0.75rem;
  }

  .pomo-fullpage-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border-glass);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s ease;
  }

  .pomo-fullpage-close:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
  }
  .pomo-fullpage-close:active { background: var(--bg-glass-hover); transform: scale(0.9); }

  .pomo-fullpage-close svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  /* Fullpage radial settings */
  .pomo-radial-settings {
    display: none;
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .pomo-radial-settings.open {
    display: block;
  }

  .radial-item {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%)
               rotate(var(--angle))
               translateY(calc(-1 * var(--distance)))
               rotate(calc(-1 * var(--angle)));
    pointer-events: auto;
    opacity: 0;
    animation: radialIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) var(--delay, 0s) forwards;
  }

  .pomo-radial-settings:not(.open) .radial-item {
    animation: none;
    opacity: 0;
  }

  @keyframes radialIn {
    from { opacity: 0; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-0.6 * var(--distance))) rotate(calc(-1 * var(--angle))); }
    to   { opacity: 1; transform: translate(-50%, -50%) rotate(var(--angle)) translateY(calc(-1 * var(--distance))) rotate(calc(-1 * var(--angle))); }
  }

  .radial-item label {
    display: block;
    font-family: var(--font-body);
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
    text-align: center;
    white-space: nowrap;
  }

  .radial-item input[type="number"] {
    width: 56px;
    padding: 0.35rem 0.25rem;
    border-radius: 12px;
    border: 1px solid var(--settings-border);
    background: var(--settings-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.85rem;
    text-align: center;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  .radial-item input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12), 0 0 0 2px var(--accent-glow);
  }

  .radial-chip .phase-chip {
    padding: 0.35rem 0.65rem;
    border-radius: 10px;
    border: 1px solid var(--settings-border);
    background: var(--settings-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--text-secondary);
    font-family: var(--font-body);
    font-size: 0.7rem;
    font-weight: 400;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s ease;
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }

  .radial-chip .phase-chip:hover {
    background: var(--bg-glass-hover);
    color: var(--text-primary);
    border-color: var(--accent);
  }

  @media (prefers-color-scheme: dark) {
    .radial-item input[type="number"] { background: rgba(255,255,255,0.06); }
    .radial-chip .phase-chip { background: rgba(255,255,255,0.06); }
  }

  @media (max-width: 600px) {
    .radial-item { --distance: 175px !important; }
  }

  @media (max-width: 420px) {
    .radial-item { --distance: clamp(100px, 28vw, 140px) !important; }
  }

  .pomo-fp-settings-close {
    display: none;
  }

  /* Phone-only: replace radial layout with clean grid for fullpage settings */
  @media (max-width: 600px) and (pointer: coarse) {
    .pomo-fullpage-overlay .pomo-radial-settings.open {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem 2rem;
      position: fixed;
      inset: 0;
      place-content: center;
      justify-items: center;
      z-index: 910;
      background: var(--bg-glass);
      backdrop-filter: blur(32px) saturate(1.4);
      -webkit-backdrop-filter: blur(32px) saturate(1.4);
      padding: 2rem 2.5rem;
      pointer-events: auto;
    }

    .pomo-fullpage-overlay .pomo-radial-settings .radial-item {
      position: static !important;
      transform: none !important;
      animation: none !important;
      opacity: 1 !important;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .pomo-fullpage-overlay .pomo-radial-settings .radial-item label {
      margin-bottom: 0.3rem;
      font-size: 0.7rem;
    }

    .pomo-fullpage-overlay .pomo-radial-settings .radial-item input[type="number"] {
      width: 72px;
      padding: 0.5rem 0.3rem;
      font-size: 1rem;
    }

    .pomo-fullpage-overlay .pomo-radial-settings .radial-chip {
      justify-self: center;
    }

    .pomo-fullpage-overlay .pomo-radial-settings .radial-chip .phase-chip {
      padding: 0.5rem 1rem;
      font-size: 0.8rem;
    }

    /* Last chip (3rd) spans full width and centers */
    .pomo-fullpage-overlay .pomo-radial-settings .radial-item:last-child {
      grid-column: 1 / -1;
    }

    .pomo-fp-settings-close {
      display: flex;
      grid-column: 1 / -1;
      justify-self: end;
      width: 36px;
      height: 36px;
      margin-bottom: -0.5rem;
    }

    .pomo-fp-settings-close svg {
      width: 16px;
      height: 16px;
    }
  }

  .pomo-ring-wrapper {
    cursor: pointer;
  }

  @media (max-width: 600px) {
    .pomo-fullpage-overlay .pomo-ring-wrapper { width: 220px; height: 220px; }
    .pomo-fullpage-overlay .pomo-ring { width: 220px; height: 220px; }
    .pomo-fullpage-overlay .pomo-time-inside { font-size: 4.2rem; }
    .pomo-fullpage-overlay .pomo-time-unit { font-size: 1.1rem; }
  }

  /* ═══════════════════════
     TOAST NOTIFICATION
     ═══════════════════════ */
  .toast {
    position: fixed;
    top: max(1.5rem, env(safe-area-inset-top, 0px));
    left: 50%;
    transform: translateX(-50%) translateY(-100%);
    z-index: 1000;
    background: var(--toast-bg);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-glass);
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    font-size: 0.8rem;
    font-weight: 300;
    color: var(--text-primary);
    box-shadow: 0 8px 24px var(--shadow-medium);
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ═══════════════════════
     TOUCH DEVICES — neutralize sticky :hover
     ═══════════════════════ */
  @media (hover: none) {
    .btn:hover,
    .pomo-btn--primary:hover,
    .pomo-btn--secondary:hover,
    .quote-minimize-btn:hover,
    .pomo-minimize-btn:hover,
    .pomo-fullscreen-btn:hover,
    .pomo-fullpage-close:hover,
    .phase-chip:hover {
      background: unset;
      color: unset;
      border-color: unset;
      box-shadow: unset;
      opacity: unset;
      transform: unset;
    }
    /* Re-apply base backgrounds that unset would remove */
    .pomo-btn--primary:hover { background: var(--pomo-work); color: #fff; box-shadow: 0 4px 14px var(--accent-glow); }
    .pomo-btn--primary.on-break:hover { background: var(--pomo-break); box-shadow: 0 4px 14px rgba(90, 127, 106, 0.25); }
    .btn:hover { background: var(--bg-glass); color: var(--text-secondary); border-color: var(--border-glass); }
  }

  /* ═══════════════════════
     RESPONSIVE
     ═══════════════════════ */
  @media (max-width: 600px) {
    .top-right-actions { padding: max(0.5rem, env(safe-area-inset-top, 0px)) max(0.5rem, env(safe-area-inset-right, 0px)) 0 0; gap: 0.35rem; }
    .lang-btn, .coffee-btn { font-size: 0.7rem; padding: 0.3rem 0.55rem; }

    /* Quote in upper portion, pomo below it — both in .content */
    .page-layout { justify-content: flex-start; padding-top: max(3rem, 8dvh); }
    .content { flex: 1; padding: 0 1rem 2.5rem; width: 100%; align-items: center; justify-content: flex-start; gap: 0.5rem; }
    .bottom-badges {
      bottom: max(0.5rem, env(safe-area-inset-bottom, 0px));
      right: max(0.5rem, env(safe-area-inset-right, 0px));
      max-width: calc(100vw - 1rem);
      flex-wrap: wrap;
      justify-content: flex-end;
      font-size: 0.58rem;
      padding: 0.25rem 0.6rem;
    }
    .img-credit { max-width: 18rem; }
    .bottom-badges .credits-divider { margin: 0 0.35rem; }

    /* Quote card */
    .quote-card { padding: 1.5rem 1.25rem; border-radius: 16px; }
    .quote-text { font-size: clamp(1rem, 3.5vw, 1.25rem); line-height: 1.45; }
    .quote-inner { max-height: 45dvh; overflow-y: auto; }

    /* Pomo container & widget — match quote card glass style */
    .pomo-container { width: 100%; margin-top: 0.5rem; }
    .pomo-widget {
      width: 100%;
      border-radius: 16px;
      padding: 1.75rem 1.25rem 1.25rem;
      gap: 0.6rem;
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
    }

    /* Adaptive ring — scales with available viewport space, larger now with more room */
    .pomo-ring-wrapper {
      width: clamp(132px, min(36vw, 22vh), 188px);
      height: clamp(132px, min(36vw, 22vh), 188px);
    }
    .pomo-ring { width: 100%; height: 100%; }
    .pomo-time-inside { font-size: clamp(2.2rem, min(7vw, 4.5vh), 3.2rem); }
    .pomo-time-unit { font-size: clamp(0.85rem, 2.2vw, 1.1rem); }
    .pomo-label { font-size: clamp(0.58rem, 1.8vw, 0.72rem); max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pomo-dots { gap: 5px; }
    .pomo-dot { width: 6px; height: 6px; }

    /* Adaptive controls */
    .pomo-btn--primary { width: clamp(40px, 11vw, 48px); height: clamp(40px, 11vw, 48px); }
    .pomo-btn--secondary { width: clamp(30px, 8vw, 36px); height: clamp(30px, 8vw, 36px); }
    .pomo-btn--primary svg { width: clamp(16px, 4.5vw, 20px); height: clamp(16px, 4.5vw, 20px); }
    .pomo-btn--secondary svg { width: clamp(12px, 3.5vw, 15px); height: clamp(12px, 3.5vw, 15px); }

    .img-credit { font-size: inherit; }

    /* Minimized pills — anchor above the credits, side-by-side */
    .pomo-widget.minimized {
      position: fixed;
      bottom: 4.5rem;

  </div>
  <!-- Fullpage radial settings -->
  <div class="pomo-radial-settings" id="pomo-fp-settings-panel">
    <button class="pomo-fp-settings-close pomo-btn pomo-btn--secondary" id="pomo-fp-settings-close" aria-label="Close settings">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
    <div class="radial-item" style="--angle: 320deg; --distance: 250px; --delay: 0s">
      <label>Focus</label>
      <input type="number" id="fp-setting-work" min="1" max="90" value="25">
    </div>
    <div class="radial-item" style="--angle: 40deg; --distance: 250px; --delay: 0.05s">
      <label>Break</label>
      <input type="number" id="fp-setting-break" min="1" max="30" value="5">
    </div>
    <div class="radial-item" style="--angle: 220deg; --distance: 250px; --delay: 0.1s">
      <label>Long</label>
      <input type="number" id="fp-setting-long" min="1" max="60" value="15">
    </div>
    <div class="radial-item" style="--angle: 140deg; --distance: 250px; --delay: 0.15s">
      <label>Sessions</label>
      <input type="number" id="fp-setting-sessions" min="1" max="12" value="4">
    </div>
    <div class="radial-item radial-chip" style="--angle: 180deg; --distance: 250px; --delay: 0.2s">
      <button class="phase-chip" id="fp-chip-focus">Focus</button>
    </div>
    <div class="radial-item radial-chip" style="--angle: 0deg; --distance: 250px; --delay: 0.25s">
      <button class="phase-chip" id="fp-chip-break">Break</button>
    </div>
    <div class="radial-item radial-chip" style="--angle: 90deg; --distance: 250px; --delay: 0.3s">
      <button class="phase-chip" id="fp-chip-long">Long Break</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════
   VERSION
   ═══════════════════════════════════════ */
const VERSION = 'v1.0.8';

/* ═══════════════════════════════════════
   STOIC QUOTES DATABASE
   ═══════════════════════════════════════ */
const QUOTES = [
  // ── Marcus Aurelius ────────────────────────────────────────────
  { text: "We suffer more often in imagination than in reality.", author: "Seneca" },
  { text: "The happiness of your life depends upon the quality of your thoughts.", author: "Marcus Aurelius, Meditations" },
  { text: "You have power over your mind — not outside events. Realize this, and you will find strength.", author: "Marcus Aurelius, Meditations" },
  { text: "The soul becomes dyed with the color of its thoughts.", author: "Marcus Aurelius, Meditations" },
  { text: "What we do now echoes in eternity.", author: "Marcus Aurelius, Meditations" },
  { text: "Waste no more time arguing about what a good man should be. Be one.", author: "Marcus Aurelius, Meditations" },
  { text: "Very little is needed to make a happy life; it is all within yourself, in your way of thinking.", author: "Marcus Aurelius, Meditations" },
  { text: "The obstacle is the way.", author: "Marcus Aurelius, Meditations" },
  { text: "When you arise in the morning think of what a privilege it is to be alive — to think, to enjoy, to love.", author: "Marcus Aurelius, Meditations" },
  { text: "Accept the things to which fate binds you, and love the people with whom fate brings you together.", author: "Marcus Aurelius, Meditations" },
  { text: "The best revenge is not to be like your enemy.", author: "Marcus Aurelius, Meditations" },
  { text: "Confine yourself to the present.", author: "Marcus Aurelius, Meditations" },
  { text: "If it is not right, do not do it; if it is not true, do not say it.", author: "Marcus Aurelius, Meditations" },
  { text: "The first rule is to keep an untroubled spirit. The second is to look things in the face and know them for what they are.", author: "Marcus Aurelius, Meditations" },
  { text: "Loss is nothing else but change, and change is Nature's delight.", author: "Marcus Aurelius, Meditations" },
  { text: "Nowhere can man find a quieter or more untroubled retreat than in his own soul.", author: "Marcus Aurelius, Meditations" },
  { text: "Reject your sense of injury and the injury itself disappears.", author: "Marcus Aurelius, Meditations" },
  { text: "It never ceases to amaze me: we all love ourselves more than other people, yet we care more about their opinion than our own.", author: "Marcus Aurelius, Meditations" },
  { text: "How much more grievous are the consequences of anger than the causes of it.", author: "Marcus Aurelius, Meditations" },
  { text: "Receive without pride; relinquish without struggle.", author: "Marcus Aurelius, Meditations" },
  { text: "Give yourself a gift: the present moment.", author: "Marcus Aurelius, Meditations" },
  { text: "Perfection of character is this: to live each day as if it were your last, without frenzy, laziness, or any pretending.", author: "Marcus Aurelius, Meditations" },
  { text: "Look back over the past, with its changing empires that rose and fell, and you can foresee the future, too.", author: "Marcus Aurelius, Meditations" },
  { text: "Do not indulge in dreams of what you do not have, but count the blessings actually present and think how much you would desire them if they were not yours.", author: "Marcus Aurelius, Meditations" },
  // ── Epictetus ──────────────────────────────────────────────────
  { text: "No man is free who is not master of himself.", author: "Epictetus, Discourses" },
  { text: "It is not things that disturb us, but our judgments about things.", author: "Epictetus, Enchiridion" },
  { text: "Wealth consists not in having great possessions, but in having few wants.", author: "Epictetus, Discourses" },
  { text: "How long are you going to wait before you demand the best for yourself?", author: "Epictetus, Discourses" },
  { text: "First say to yourself what you would be; and then do what you have to do.", author: "Epictetus, Discourses" },
  { text: "Man is not worried by real problems so much as by his imagined anxieties about real problems.", author: "Epictetus" },
  { text: "Make the best use of what is in your power, and take the rest as it happens.", author: "Epictetus, Enchiridion" },
  { text: "Freedom is the only worthy goal in life. It is won by disregarding things that lie beyond our control.", author: "Epictetus, Discourses" },
  { text: "Seek not the good in external things; seek it in yourself.", author: "Epictetus, Discourses" },
  { text: "He is a wise man who does not grieve for the things which he has not, but rejoices for those which he has.", author: "Epictetus" },
  // ── Seneca ─────────────────────────────────────────────────────
  { text: "Difficulties strengthen the mind, as labor does the body.", author: "Seneca, Letters" },
  { text: "It is not because things are difficult that we do not dare; it is because we do not dare that they are difficult.", author: "Seneca, Letters" },
  { text: "He who fears death will never do anything worthy of a living man.", author: "Seneca, Letters" },
  { text: "If a man knows not to which port he sails, no wind is favorable.", author: "Seneca, Letters" },
  { text: "True happiness is to enjoy the present, without anxious dependence upon the future.", author: "Seneca, Letters" },
  { text: "Luck is what happens when preparation meets opportunity.", author: "Seneca" },
  { text: "Begin at once to live, and count each separate day as a separate life.", author: "Seneca, Letters" },
  { text: "The whole future lies in uncertainty: live immediately.", author: "Seneca, Letters" },
  { text: "A gem cannot be polished without friction, nor a man perfected without trials.", author: "Seneca" },
  { text: "We suffer more in imagination than in reality.", author: "Seneca, Letters" },
  // ── Musonius Rufus (Stoic teacher, contemporary of Epictetus) ──
  { text: "It is not possible to live well today unless you treat it as your last day.", author: "Musonius Rufus" },
  { text: "If you accomplish something good with hard work, the labor passes quickly, but the good endures; if you do something shameful in pursuit of pleasure, the pleasure passes quickly, but the shame endures.", author: "Musonius Rufus" },
  { text: "The person who follows nature and practices virtue will be self-sufficient in all things.", author: "Musonius Rufus" },
  { text: "We should not esteem any good or evil of the body too highly; we should practice indifference to them.", author: "Musonius Rufus" },
  { text: "Just as the body must be exercised to become strong, so must the mind be trained in reasoning.", author: "Musonius Rufus" },
  // ── Zeno of Citium (Founder of Stoicism) ──────────────────────
  { text: "Man conquers the world by conquering himself.", author: "Zeno of Citium" },
  { text: "Better to trip with the feet than with the tongue.", author: "Zeno of Citium" },
  { text: "We have two ears and one mouth, so we should listen more than we say.", author: "Zeno of Citium" },
  { text: "Happiness is a good flow of life.", author: "Zeno of Citium" },
  { text: "The goal of life is living in agreement with Nature.", author: "Zeno of Citium" },
  // ── Buddha / Dhammapada (root of Vipassana tradition) ─────────
  { text: "Do not dwell in the past, do not dream of the future; concentrate the mind on the present moment.", author: "The Buddha" },
  { text: "Peace comes from within. Do not seek it without.", author: "The Buddha, Dhammapada" },
  { text: "You yourself must strive. The Buddhas only point the way.", author: "Dhammapada" },
  { text: "Ardently do today what must be done. Who knows? Tomorrow, death comes.", author: "Dhammapada" },
  { text: "Better than a thousand hollow words is one word that brings peace.", author: "Dhammapada" },
  { text: "Irrigators channel waters; fletchers straighten arrows; carpenters shape wood; the wise master themselves.", author: "Dhammapada" },
  { text: "Purity or impurity depends on oneself. No one can purify another.", author: "Dhammapada" },
  { text: "Health is the greatest gift, contentment the greatest wealth, faithfulness the best relationship.", author: "The Buddha, Dhammapada" },
  { text: "To conquer oneself is a greater victory than to conquer thousands in battle.", author: "Dhammapada" },
  { text: "Three things cannot be long hidden: the sun, the moon, and the truth.", author: "The Buddha" },
  { text: "As a solid rock is not shaken by the wind, so the wise are not moved by praise or blame.", author: "Dhammapada" },
  { text: "Drop by drop the water pot is filled. Likewise, the wise one, gathering little by little, fills herself with good.", author: "Dhammapada" },

  // ── Lao Tzu / Tao Te Ching ─────────────────────────────
  { text: "The Tao that can be told is not the eternal Tao. The name that can be named is not the eternal name.", author: "Lao Tzu, Tao Te Ching" },
  { text: "When I let go of what I am, I become what I might be.", author: "Lao Tzu" },
  { text: "Nature does not hurry, yet everything is accomplished.", author: "Lao Tzu" },
  { text: "A journey of a thousand miles begins with a single step.", author: "Lao Tzu, Tao Te Ching" },
  { text: "He who knows others is wise; he who knows himself is enlightened.", author: "Lao Tzu, Tao Te Ching" },
  { text: "The softest things in the world overcome the hardest things in the world.", author: "Lao Tzu, Tao Te Ching" },
  { text: "Be content with what you have; rejoice in the way things are. When you realize there is nothing lacking, the whole world belongs to you.", author: "Lao Tzu, Tao Te Ching" },
  { text: "Silence is a source of great strength.", author: "Lao Tzu" },

  // ── Rumi ────────────────────────────────────────────────
  { text: "The wound is the place where the Light enters you.", author: "Rumi" },
  { text: "Yesterday I was clever, so I wanted to change the world. Today I am wise, so I am changing myself.", author: "Rumi" },
  { text: "Don't grieve. Anything you lose comes round in another form.", author: "Rumi" },
  { text: "Let yourself be silently drawn by the strange pull of what you really love. It will not lead you astray.", author: "Rumi" },
  { text: "You are not a drop in the ocean. You are the entire ocean in a drop.", author: "Rumi" },
  { text: "Raise your words, not your voice. It is rain that grows flowers, not thunder.", author: "Rumi" },

  // ── Thich Nhat Hanh ────────────────────────────────────
  { text: "The present moment is filled with joy and happiness. If you are attentive, you will see it.", author: "Thich Nhat Hanh" },
  { text: "Feelings come and go like clouds in a windy sky. Conscious breathing is my anchor.", author: "Thich Nhat Hanh" },
  { text: "Smile, breathe, and go slowly.", author: "Thich Nhat Hanh" },
  { text: "When another person makes you suffer, it is because he suffers deeply within himself, and his suffering is spilling over.", author: "Thich Nhat Hanh" },
  { text: "The seed of suffering in you may be strong, but don't wait until you have no more suffering before allowing yourself to be happy.", author: "Thich Nhat Hanh" },

  // ── Alan Watts ─────────────────────────────────────────
  { text: "The only way to make sense out of change is to plunge into it, move with it, and join the dance.", author: "Alan Watts" },
  { text: "Muddy water is best cleared by leaving it alone.", author: "Alan Watts" },
  { text: "You are a function of what the whole universe is doing in the same way that a wave is a function of what the whole ocean is doing.", author: "Alan Watts" },
  { text: "This is the real secret of life — to be completely engaged with what you are doing in the here and now. And instead of calling it work, realize it is play.", author: "Alan Watts" },
  { text: "We seldom realize, for example, that our most private thoughts and emotions are not actually our own. For we think in terms of languages and images which we did not invent.", author: "Alan Watts" },

  // ── Heraclitus ─────────────────────────────────────────
  { text: "No man ever steps in the same river twice, for it is not the same river and he is not the same man.", author: "Heraclitus" },
  { text: "The soul is dyed the color of its thoughts.", author: "Heraclitus" },
  { text: "Character is destiny.", author: "Heraclitus" },
  { text: "Everything flows and nothing abides; everything gives way and nothing stays fixed.", author: "Heraclitus" },
  { text: "The eyes are more exact witnesses than the ears.", author: "Heraclitus" },

  // ── Aristotle (on virtue & eudaimonia) ─────────────────
  { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", author: "Aristotle" },
  { text: "Happiness depends upon ourselves.", author: "Aristotle" },
  { text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle" },
  { text: "The soul never thinks without a mental image.", author: "Aristotle" },

  // ── Japanese / Zen Proverbs ────────────────────────────
  { text: "Fall seven times, stand up eight.", author: "Japanese Proverb" },
  { text: "The bamboo that bends is stronger than the oak that resists.", author: "Japanese Proverb" },
  { text: "Sitting quietly, doing nothing, spring comes, and the grass grows by itself.", author: "Zen Proverb" },
  { text: "When you reach the top of the mountain, keep climbing.", author: "Zen Proverb" },
  { text: "Before enlightenment, chop wood, carry water. After enlightenment, chop wood, carry water.", author: "Zen Proverb" },

  // ── More Marcus Aurelius (deeper cuts) ─────────────────
  { text: "How much more grievous are the consequences of anger than the causes of it.", author: "Marcus Aurelius, Meditations" },
  { text: "If it is not right, do not do it. If it is not true, do not say it.", author: "Marcus Aurelius, Meditations" },
  { text: "Each day provides its own gifts.", author: "Marcus Aurelius, Meditations" },
  { text: "Never esteem anything as of advantage to you that will make you break your word or lose your self-respect.", author: "Marcus Aurelius, Meditations" },

  // ── More Seneca (deeper cuts) ──────────────────────────
  { text: "We are more often frightened than hurt; and we suffer more in imagination than in reality.", author: "Seneca, Letters to Lucilius" },
  { text: "Luck is what happens when preparation meets opportunity.", author: "Seneca" },
  { text: "A gem cannot be polished without friction, nor a man perfected without trials.", author: "Seneca" },
  { text: "It is not that we have a short time to live, but that we waste a great deal of it.", author: "Seneca, On the Shortness of Life" },

  // ── Cato / Cleanthes / Chrysippus ─────────────────────
  { text: "Bitter are the roots of study, but how sweet their fruit.", author: "Cato the Elder" },
  { text: "Lead me, O Zeus, and thou, O Destiny, to wherever your decrees have assigned me. I follow willingly, and if I did not, wretched though I am, I must follow still.", author: "Cleanthes, Hymn to Zeus" },
  { text: "The universe itself is God and the universal outpouring of its soul.", author: "Chrysippus" },
  { text: "Living virtuously is equal to living in accordance with one's experience of the actual course of nature.", author: "Chrysippus" },

  // ── Indigenous Nations of Quebec & Canada ─────────────────
  { text: "All things are connected. Whatever befalls the earth befalls the children of the earth.", author: "Chief Seattle, Duwamish" },
  { text: "We do not inherit the earth from our ancestors; we borrow it from our children.", author: "Anishinaabe Proverb" },
  { text: "When you were born, you cried and the world rejoiced. Live your life so that when you die, the world cries and you rejoice.", author: "Cherokee Proverb" },
  { text: "The ground on which we stand is sacred ground. It is the blood of our ancestors.", author: "Chief Plenty Coups, Crow Nation" },
  { text: "What is life? It is the flash of a firefly in the night. It is the breath of a buffalo in the wintertime. It is the little shadow which runs across the grass and loses itself in the sunset.", author: "Crowfoot, Blackfoot Confederacy" },
  { text: "With all things and in all things, we are relatives.", author: "Lakota Proverb" },
  { text: "Listen to the wind, it talks. Listen to the silence, it speaks. Listen to your heart, it knows.", author: "Indigenous Proverb" },
  { text: "The Great Spirit is in all things. He is in the air we breathe. The Great Spirit is our father, but the earth is our mother.", author: "Big Thunder, Wabanaki Nation" },
  { text: "We are made from Mother Earth and we go back to Mother Earth.", author: "Shenandoah, Onondaga Nation" },
  { text: "Take only what you need and leave the land as you found it.", author: "Arapaho Proverb" },
  { text: "One thing to remember is to talk to the animals. If you do, they will talk back to you. But if you don't talk to them, they won't talk back to you, then you won't understand. And when you don't understand, you will fear, and when you fear, you will destroy.", author: "Chief Dan George, Tsleil-Waututh Nation" },
  { text: "Every part of the earth is sacred to my people. Every shining pine needle, every sandy shore, every mist in the dark woods.", author: "Chief Seattle, Duwamish" },
  { text: "Treat the earth well: it was not given to you by your parents, it was loaned to you by your children.", author: "Haudenosaunee Proverb" },
  { text: "The frog does not drink up the pond in which he lives.", author: "Sioux Proverb" },
  { text: "When we show our respect for other living things, they respond with respect for us.", author: "Arapaho Proverb" },
  { text: "Walk lightly in the spring; Mother Earth is pregnant.", author: "Kiowa Proverb" },
  { text: "A brave man dies but once, a coward many times.", author: "Mohawk Proverb" },
  { text: "Don't let yesterday use up too much of today.", author: "Cherokee Proverb" },
  { text: "There is no death, only a change of worlds.", author: "Chief Seattle, Duwamish" },

  // ── Inuit Wisdom ─────────────────────────────────────────
  { text: "Yesterday is ashes; tomorrow is wood. Only today does the fire burn brightly.", author: "Inuit Proverb" },
  { text: "You never really know the true value of a moment until it becomes a memory.", author: "Inuit Proverb" },
  { text: "If you want to go fast, go alone. If you want to go far, go together.", author: "Cree Proverb" },
  { text: "A people without knowledge of their past history, origin and culture is like a tree without roots.", author: "Wendat Proverb" },

  // ── Haudenosaunee / Six Nations ──────────────────────────
  { text: "Let us put our minds together as one and give thanks for all that sustains us.", author: "Haudenosaunee Thanksgiving Address" },
  { text: "The measure of a great civilization is not found in the mirror of its power, but in the welfare of its citizens.", author: "Haudenosaunee Teaching" },
  { text: "Women and men should move together side by side. The male and female are to work together as partners.", author: "Haudenosaunee Code of Handsome Lake" },
  { text: "Give thanks for the gifts of the earth and all living things. Gratitude keeps us connected to the earth and to each other.", author: "Haudenosaunee Teaching" },

  // ── Mi'kmaq (Maritime Peoples) ─────────────────────────
  { text: "We are here to help the Earth, not to harm her. What we do to the Earth, we do to ourselves.", author: "Mi'kmaq Principle" },
  { text: "The Mi'kmaq have always believed in living in harmony with the land and respecting all life. This is our way.", author: "Mi'kmaq Teaching" },
  { text: "Everything has a spirit and an intention. We must treat all things with respect.", author: "Mi'kmaq Wisdom" },
  { text: "We are all related through Mother Earth. We share responsibility for her care.", author: "Mi'kmaq Proverb" },

  // ── Métis (Peoples of Mixed Heritage) ────────────────
  { text: "We are the descendants of the great fur traders and the First Nations. We carry both legacies with pride.", author: "Métis Teaching" },
  { text: "Self-determination and respect for our unique culture is what defines the Métis nation.", author: "Métis Principle" },
  { text: "The land remembers everything. It teaches us if we listen with our hearts.", author: "Métis Wisdom" },

  // ── Anishinaabe (Great Lakes Peoples) ────────────────
  { text: "Seven sacred teachings guide the Anishinaabe: Truth, Humility, Respect, Courage, Wisdom, Honesty, and Love.", author: "Anishinaabe Teaching" },
  { text: "We are all connected through the circle of life. Our choices affect all my relations.", author: "Anishinaabe Principle" },
  { text: "Listen to the elders. In their words is the knowledge passed down through generations.", author: "Anishinaabe Wisdom" },

  // ── Indigenous Cosmologies — Quebec & Canada ────────────────
  // Creation narratives and origin stories from the nations of this land

  // Wendat (Huron-Wendat) — Wendake, Quebec
  { text: "Aataentsic fell from the Sky World through a hole left when the great celestial tree was uprooted. The water animals dove deep to bring up earth, and the turtle offered its back. Upon Turtle's shell, the earth was spread, and so our world began.", author: "Wendat Creation — Aataentsic and Turtle Island" },
  { text: "Iouskeha, grandson of Aataentsic, shaped the rivers so they would flow in both directions, making travel easy. But his twin Tawiscaron made the waters rush one way and scattered rocks to create rapids. From their rivalry, the world gained its balance of ease and challenge.", author: "Wendat Creation — The Twin Grandsons" },

  // Anishinaabe — Great Lakes, Quebec, Ontario
  { text: "When the great flood covered the earth, Nanabozho clung to a log with the animals. He asked each to dive for soil. The muskrat finally surfaced with a pawful of mud, and from that small gift, Nanabozho rebuilt the entire world on the turtle's back.", author: "Anishinaabe Creation — Nanabozho and the Flood" },
  { text: "Nanabozho was given a sacred task: to walk the earth and name every plant, every stone, every creature. In the naming, he learned that to truly know something, you must first be still enough to hear what it calls itself.", author: "Anishinaabe Teaching — The Naming of the World" },

  // Innu (Montagnais-Naskapi) — Northern Quebec, Labrador
  { text: "Tshakapesh was raised by his elder sister after their parents were devoured by a great bear. Though small, he grew to outwit every danger the forest sent. He climbed to the moon on a great tree and remains there still, watching over the Innu people below.", author: "Innu Story — Tshakapesh and the Moon" },
  { text: "The Innu say that Caribou Spirit, Papakassik, decides when the herds will come. A hunter must approach with a respectful heart and empty hands, for the caribou give themselves only to those who honour the bond between hunter and hunted.", author: "Innu Cosmology — Papakassik, Master of the Caribou" },
  { text: "In the time before this time, Meshapush the trickster rearranged the rivers of Nitassinan so that the fish would swim in circles and the Innu would always have food. But he also hid the best fishing spots behind riddles, so that only the patient would find them.", author: "Innu Story — Meshapush and the Rivers" },

  // Haudenosaunee — Southern Quebec, Ontario, New York
  { text: "The Peacemaker came across the great lake in a white stone canoe, carrying the message of the Great Law. He planted the Tree of Peace — a great white pine — and beneath its roots, the nations buried their weapons. The eagle atop watches still for any threat to that peace.", author: "Haudenosaunee — The Great Law of Peace" },
  { text: "Sky Woman danced on the turtle's back, and as she danced, the earth grew beneath her feet. She scattered seeds from the Sky World, and from them grew the Three Sisters — corn, beans, and squash — who hold each other up as true sisters do.", author: "Haudenosaunee Creation — Sky Woman and the Three Sisters" },

  // Algonquin — Ottawa Valley, Western Quebec
  { text: "Wisakedjak, the trickster, tried to catch the sun in a snare to make the days longer. When the sun begged to be freed, Wisakedjak relented — but not before he had learned that even the most powerful forces are bound by the same web of relationships as the smallest creature.", author: "Algonquin Story — Wisakedjak and the Sun Snare" },
  { text: "The Algonquin say the northern lights are the fires of the ancestors, dancing to remind us they are near. When the sky burns green and violet, the old ones are celebrating, and we are invited to remember that the boundary between worlds is thinner than we think.", author: "Algonquin Cosmology — The Ancestors' Fires" },

  // Mi'kmaq — Maritime provinces, Gaspésie
  { text: "Glooscap shaped the land of the Maritimes with his great power. He turned his enemies into stone, carved rivers with his paddle, and called the animals to council. When he left, he promised to return when the Mi'kmaq needed him most, and the whales still sing of his coming.", author: "Mi'kmaq Creation — Glooscap the Shaper" },
  { text: "Glooscap asked the Great Spirit for companions, and from the foam of the ocean waves, a woman was formed. From the red clay of the earth, a man was shaped. Together they were given the gift of dreams, so they could see beyond what the waking eye can hold.", author: "Mi'kmaq Creation — The First Man and Woman" },

  // Cree — Northern Quebec (Eeyou Istchee), Ontario, Prairies
  { text: "Wesakechak floated on the endless water after the great flood, weeping for the drowned world. He sent the otter, the beaver, and finally the muskrat to find soil. The muskrat returned half-drowned, clutching a tiny ball of earth. From that small courage, the whole land was reborn.", author: "Cree Creation — Wesakechak and the Great Flood" },
  { text: "The Cree say that when you walk through the boreal forest in deep winter, the trees crack and groan because they are speaking. The cold makes their voices sharp, but if you listen well, they are telling you where the animals have gone and which path leads home.", author: "Cree Teaching — The Speaking Trees" },

  // Abenaki — Eastern Townships, Vermont, Maine
  { text: "Tabaldak, the Owner of All, made the world from nothing but his own thought. He shaped the people from the living bark of the ash tree, and breathed into them the wind from the four directions. That is why the Abenaki feel the pull of the forest — they were born from it.", author: "Abenaki Creation — Tabaldak and the Ash Tree" },
  { text: "Gluskabe shot arrows into the ash tree, and from the bark emerged the first Abenaki people. He then set to work making the world safer: he shrank the giant squirrel, tamed the great wind eagle, and taught the rivers to slow down. The world, he said, should be difficult enough to keep people strong, but gentle enough to let them rest.", author: "Abenaki Story — Gluskabe Shapes the World" },

  // Atikamekw — Haute-Mauricie, Central Quebec
  { text: "The Atikamekw say the forest is not a place you enter — it is a relative you visit. Every tree remembers every season, and the moss keeps the footprints of all who have passed. To walk in Nitaskinan is to walk through a living memory that stretches back to the first morning.", author: "Atikamekw Teaching — The Living Forest" },

  // ── Vipassana Tradition ──────────────────────────────────
  { text: "The entire path of Dhamma is a path of living by example, not of proselytizing.", author: "S.N. Goenka" },
  { text: "Start with the reality of this moment, not with theories. Observe, and truth will reveal itself.", author: "S.N. Goenka" },
  { text: "Be happy, be peaceful. Keep on observing the reality as it is.", author: "S.N. Goenka" },
  { text: "The habit pattern of the mind is to roll in craving or aversion. Vipassana teaches you just to observe.", author: "S.N. Goenka" },
  { text: "You are your own master. No one from outside can dominate you unless you allow your mind to be dominated.", author: "S.N. Goenka" },
  { text: "Awareness and equanimity — this is the essence of Vipassana.", author: "S.N. Goenka" },
  { text: "Every sensation arises and passes away. Nothing is permanent. When you practice this understanding with every fibre, you are liberated.", author: "S.N. Goenka" },
  { text: "Do not convert people to any sect or organized religion. Convert them from misery to happiness, from bondage to liberation.", author: "S.N. Goenka" },
  { text: "Anicca — impermanence. This is the key. When you understand impermanence at the deepest level, suffering dissolves.", author: "S.N. Goenka" },
  { text: "The mind spends most of its time in the past or the future. Suffering results from not being with the present reality.", author: "S.N. Goenka" },
  { text: "The purpose of meditation is to purify the mind — to free it from unwholesome states and to develop wholesome ones.", author: "Mahasi Sayadaw" },
  { text: "In the process of noting, the meditator observes the actual nature of mind and body as they occur moment to moment.", author: "Mahasi Sayadaw" },
  { text: "When mindfulness is strong, nothing that happens is upsetting.", author: "Mahasi Sayadaw" },
  { text: "The way to peace is not through the outside world, but through the inner world of each individual.", author: "S.N. Goenka" },
  { text: "Work diligently. Diligently. Work patiently and persistently. Patiently and persistently. And you are bound to be successful. Bound to be successful.", author: "S.N. Goenka" },
];

let currentQuoteIdx = 0;
let currentBgIdx = 0;

/* ═══════════════════════════════════════
   QUOTE LOGIC
   ═══════════════════════════════════════ */
function showRandomQuote() {
  const textEl = document.getElementById('quote-text');
  const authorEl = document.getElementById('quote-author');

  // fade out — wait longer than the transition (0.35s) before swapping
  textEl.style.opacity = '0';
  authorEl.style.opacity = '0';

  setTimeout(() => {
    let idx;
    do { idx = Math.floor(Math.random() * QUOTES.length); } while (idx === currentQuoteIdx && QUOTES.length > 1);
    currentQuoteIdx = idx;

    textEl.textContent = QUOTES[idx].text;
    authorEl.textContent = QUOTES[idx].author;

    // Double rAF ensures browser renders opacity:0 before starting fade-in transition
    requestAnimationFrame(() => requestAnimationFrame(() => {
      textEl.style.opacity = '1';
      authorEl.style.opacity = '1';
    }));
  }, 420);
}

/* ═══════════════════════════════════════
   BACKGROUND LOGIC
   Static pool + dynamic Unsplash random fetch
   for infinite variety.
   ═══════════════════════════════════════ */
const UNSPLASH_TOPICS = ['nature', 'wallpapers', 'travel', 'architecture'];
let _lastDynamicUrl = '';

function loadBackground(index) {
  const bg = BACKGROUNDS[index];
  _applyBackground(bg.url, bg.credit, bg.link, bg.source || 'Unsplash', bg.title || '');
}

function _applyBackground(url, creditText, linkUrl, source, title = '') {
  const layer = document.getElementById('bg-layer');
  const credit = document.getElementById('img-credit');

  layer.classList.remove('loaded');

  const img = new Image();
  img.onload = () => {
    layer.style.backgroundImage = `url(${url})`;
    layer.classList.add('loaded');
    if (source === 'Unsplash' || source === 'Pexels') {
      const titlePart = title ? `«${title}» · ` : '';
      credit.innerHTML = `Photo: ${titlePart}<a href="${linkUrl}" target="_blank" rel="noopener">${creditText}</a> · ${source}`;
    } else {
      credit.innerHTML = `<a href="${linkUrl}" target="_blank" rel="noopener">${creditText}</a> · ${source}`;
    }
    document.querySelector('.bottom-badges').classList.add('visible');
  };
  img.onerror = () => {
    // fallback to static pool
    currentBgIdx = (currentBgIdx + 1) % BACKGROUNDS.length;
    loadBackground(currentBgIdx);
  };
  img.src = url;
}

function _fetchDynamicBackground() {
  const topic = UNSPLASH_TOPICS[Math.floor(Math.random() * UNSPLASH_TOPICS.length)];
  const w = Math.max(screen.width, 1920);
  const url = `https://source.unsplash.com/random/${w}x${Math.round(w * 0.6)}/?${topic}&t=${Date.now()}`;

  const img = new Image();
  img.onload = () => {
    // source.unsplash.com redirects to the actual image URL
    const finalUrl = img.src;
    if (finalUrl === _lastDynamicUrl) {
      // Got same image, fall back to static pool
      _nextFromPool();
      return;
    }
    _lastDynamicUrl = finalUrl;
    _applyBackground(finalUrl, topic, `https://unsplash.com/s/photos/${topic}`, 'Unsplash');
  };
  img.onerror = () => {
    // Dynamic fetch failed, fall back to static pool
    _nextFromPool();
  };
  img.src = url;
}

function _nextFromPool() {
  let idx;
  do { idx = Math.floor(Math.random() * BACKGROUNDS.length); } while (idx === currentBgIdx && BACKGROUNDS.length > 1);
  currentBgIdx = idx;
  loadBackground(currentBgIdx);
}

function nextBackground() {
  // 50% chance dynamic fetch, 50% curated pool — ensures variety + reliability
  if (Math.random() < 0.5) {
    _fetchDynamicBackground();
  } else {
    _nextFromPool();
  }
}
